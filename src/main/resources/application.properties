spring.application.name=QuizAI
spring.config.import=optional:file:./application-local.properties

# ???????????? ???????
server.port=8080

# ????????? ?? ??? DbService
# ????????? ??? Docker-?????????? PostgreSQL
# ????? ???????? ?????????? ?????????, ??? ????????? Docker ???????
app.database.url=jdbc:postgresql://localhost:5432/quizai
app.database.user=postgres
app.database.password=postgres

spring.web.resources.static-locations=classpath:/templates/
spring.mvc.static-path-pattern=/**

# Redis configuration for OTP storage
app.redis.host=${OTP_REDIS_HOST:localhost}
app.redis.port=${OTP_REDIS_PORT:6379}
app.redis.password=${OTP_REDIS_PASSWORD:}
app.redis.database=${OTP_REDIS_DATABASE:0}

# SMTP configuration for OTP emails
app.mail.host=${OTP_MAIL_HOST:smtp.yandex.ru}
app.mail.port=${OTP_MAIL_PORT:465}
app.mail.username=${OTP_MAIL_USERNAME:}
app.mail.password=${OTP_MAIL_PASSWORD:}
app.mail.protocol=${OTP_MAIL_PROTOCOL:smtp}
app.mail.auth=${OTP_MAIL_AUTH:true}
app.mail.starttls=${OTP_MAIL_STARTTLS:false}
app.mail.ssl=${OTP_MAIL_SSL:true}
app.mail.from=${OTP_MAIL_FROM:no-reply@example.com}
app.mail.from-name=${OTP_MAIL_FROM_NAME:QuizAI}
app.mail.connection-timeout-ms=${OTP_MAIL_CONNECTION_TIMEOUT_MS:5000}
app.mail.timeout-ms=${OTP_MAIL_TIMEOUT_MS:5000}
app.mail.write-timeout-ms=${OTP_MAIL_WRITE_TIMEOUT_MS:5000}

# OTP settings
app.otp.ttl-seconds=${OTP_TTL_SECONDS:300}
app.otp.resend-cooldown-seconds=${OTP_RESEND_COOLDOWN_SECONDS:60}
app.otp.max-verification-attempts=${OTP_MAX_VERIFICATION_ATTEMPTS:5}
app.otp.code-length=${OTP_CODE_LENGTH:6}
app.otp.test-endpoint-enabled=${OTP_TEST_ENDPOINT_ENABLED:false}
# ????????? Kafka ??? ????????? ???????? ML
spring.kafka.bootstrap-servers=localhost:9092
app.service.role=both
# ???????? ?? ml-question-requests (??? Python embedding_service ???? ?????? id ????????)
app.kafka.topic.question-generation-requests=question-generation-requests
app.kafka.topic.question-generation-results=ml-question-results
# ????????? ? Python embedding_service (?????? id ????????)
app.kafka.topic.embedding-requests=ml-question-requests
app.kafka.topic.python-validation-requests=python-validation-requests
app.kafka.topic.python-validation-results=python-validation-results
app.kafka.message.max-regeneration-attempts=3
spring.kafka.consumer.group-id=question-generation-consumer-group
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# LLM generation settings (can be overridden via env APP_LLM_*)
app.llm.url=${APP_LLM_URL:http://localhost:11434/api/chat}
app.llm.model=${APP_LLM_MODEL:qwen2.5}
app.llm.connect-timeout-seconds=${APP_LLM_CONNECT_TIMEOUT_SECONDS:30}
app.llm.request-timeout-seconds=${APP_LLM_REQUEST_TIMEOUT_SECONDS:120}
app.llm.max-retries-per-question=${APP_LLM_MAX_RETRIES_PER_QUESTION:3}
app.llm.temperature=${APP_LLM_TEMPERATURE:0.5}
app.llm.num-predict=${APP_LLM_NUM_PREDICT:1024}


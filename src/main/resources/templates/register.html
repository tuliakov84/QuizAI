<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles/reg_style.css">
    <title>QUIZAI</title>
</head>

<body>
<div class="main_cont">
    <header>
        <h1>QUIZ AI</h1>
        <p>Регистрация в системе</p>
    </header>
    <main>
        <div class="main_rect">
            <div class="name">
                <span>Имя пользователя</span>
                <div class="input-group">
                    <input type="text" name="username" placeholder="Имя пользователя" required>
                </div>
            </div>
            <div class="name">
                <span>Почта</span>
                <div class="input-group">
                    <input type="email" name="email" placeholder="you@example.com" required>
                </div>
            </div>
            <div class="password">
                <span>Пароль</span>
                <div class="input-group">
                    <input type="password" name="password1" placeholder="Пароль" required>
                </div>
            </div>
            <div class="password">
                <span>Повторите ваш пароль</span>
                <div class="input-group">
                    <input type="password" name="password2" placeholder="Повторите ваш пароль" required>
                </div>
            </div>
            <div class="enter">
                <button type="button" class="btn" id="request-code-btn">ОТПРАВИТЬ КОД</button>
            </div>
            <div class="password" id="code-block" style="display: none;">
                <span>Код из письма</span>
                <div class="input-group">
                    <input type="text" name="code" placeholder="Введите код" maxlength="8">
                </div>
            </div>
            <div class="enter" id="confirm-block" style="display: none;">
                <button type="button" class="btn" id="confirm-btn">ПОДТВЕРДИТЬ РЕГИСТРАЦИЮ</button>
            </div>
            <div class="ent_href">
                <span>Уже есть аккаунт?</span>
                <a href="index.html">Войти в аккаунт</a>
            </div>
        </div>
    </main>
</div>
</body>

<script src="/js/auth.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
      const requestCodeBtn = document.getElementById('request-code-btn');
      const confirmBtn = document.getElementById('confirm-btn');
      const codeBlock = document.getElementById('code-block');
      const confirmBlock = document.getElementById('confirm-block');
      const usernameInput = document.querySelector('input[name="username"]');
      const emailInput = document.querySelector('input[name="email"]');
      const password1Input = document.querySelector('input[name="password1"]');
      const password2Input = document.querySelector('input[name="password2"]');
      const codeInput = document.querySelector('input[name="code"]');

      async function requestOtp(e) {
        e.preventDefault();

        const username = usernameInput.value.trim();
        const email = emailInput.value.trim();
        const password1 = password1Input.value;
        const password2 = password2Input.value;

        if (!username || !email || !password1 || !password2) {
          alert('Пожалуйста, заполните все поля');
          return;
        }

        if (password1 !== password2) {
          alert('Пароли не совпадают');
          return;
        }

        if (password1.length < 8) {
          alert('Пароль должен быть не менее 8 символов и соответствовать правилам безопасности');
          return;
        }

        if (username.length < 4) {
          alert('Имя пользователя должно быть не менее 4 символов');
          return;
        }

        try {
          requestCodeBtn.textContent = 'ОТПРАВКА...';
          requestCodeBtn.disabled = true;

          const response = await fetch('/api/auth/register/request-otp', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              username: username,
              email: email,
              password: password1
            })
          });
          const data = await response.json();

          if (!response.ok) {
            alert('Ошибка регистрации: ' + (data.message || `Ошибка ${response.status}`));
            return;
          }

          if (data.status === 'REGISTRATION_COMPLETED') {
            sessionStorage.removeItem('pendingRegistrationEmail');
            alert('Регистрация завершена. Теперь можно войти в аккаунт.');
            window.location.href = 'index.html';
            return;
          }

          sessionStorage.setItem('pendingRegistrationEmail', email);
          codeBlock.style.display = 'block';
          confirmBlock.style.display = 'block';
          alert('Код отправлен на почту. Введите его, чтобы завершить регистрацию.');
        } catch (error) {
          console.error('Registration request error:', error);
          alert('Ошибка соединения с сервером: ' + error.message);
        } finally {
          requestCodeBtn.textContent = 'ОТПРАВИТЬ КОД';
          requestCodeBtn.disabled = false;
        }
      }

      async function confirmRegistration(e) {
        e.preventDefault();

        const email = sessionStorage.getItem('pendingRegistrationEmail') || emailInput.value.trim();
        const code = codeInput.value.trim();

        if (!email || !code) {
          alert('Введите код из письма');
          return;
        }

        try {
          confirmBtn.textContent = 'ПРОВЕРКА...';
          confirmBtn.disabled = true;

          const response = await fetch('/api/auth/register/confirm', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              email: email,
              code: code
            })
          });
          const data = await response.json();

          if (!response.ok) {
            alert('Ошибка подтверждения: ' + (data.message || `Ошибка ${response.status}`));
            return;
          }

          sessionStorage.removeItem('pendingRegistrationEmail');
          alert('Регистрация завершена. Теперь можно войти в аккаунт.');
          window.location.href = 'index.html';

        } catch (error) {
          console.error('Registration confirm error:', error);
          alert('Ошибка соединения с сервером: ' + error.message);
        } finally {
          confirmBtn.textContent = 'ПОДТВЕРДИТЬ РЕГИСТРАЦИЮ';
          confirmBtn.disabled = false;
        }
      }

      requestCodeBtn.addEventListener('click', requestOtp);
      confirmBtn.addEventListener('click', confirmRegistration);

      const inputs = document.querySelectorAll('input');
      inputs.forEach(input => {
        input.addEventListener('keypress', function(e) {
          if (e.key === 'Enter') {
            if (codeBlock.style.display === 'block' && input.name === 'code') {
              confirmRegistration(e);
            } else {
              requestOtp(e);
            }
          }
        });
      });
    });
</script>

</html>

<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles/roommember_style.css">
    <title>QUIZAI</title>
</head>

<body>
<div class="main_cont">
    <main>
        <div class="left">
            <header>
                <a href="connect1.html" class="btn_back">НАЗАД</a>
                <h1 class="h11">QUIZ AI ARENA</h1>
            </header>

            <div class="players">
                <div class="players-header">
                    <span class="players-title">УЧАСТНИКИ:</span>
                    <span id="players-count" class="players-count">0/0</span>
                </div>
                <div id="players-container" class="players-list">
                    <!-- Игроки будут загружены через JavaScript -->
                </div>
            </div>
        </div>

        <div class="right">
            <div class="hero-card">
                <div class="panel-badge">WAITING LOBBY</div>
                <div class="h13 hero-text">
                    ВЫ В КОМНАТЕ КВИЗА! ЖДЁМ ЕГО НАЧАЛА!
                </div>
            </div>

            <div class="info-label">
                ССЫЛКА-ПРИГЛАШЕНИЕ:
            </div>
            <div id="invite-link" class="link">Загрузка...</div>

            <div class="info-label">
                ID-КВИЗА:
            </div>
            <div id="invite-id" class="link">Загрузка...</div>

            <div class="main_blockr">
                <span class="section-title">ТЕМА КВИЗА:</span>
                <div class="theme">
                    <div id="quiz-theme" class="h11 theme-title">Загрузка...</div>
                </div>

                <span id="room-status" class="room-status">
                    КВИЗ СКОРО НАЧНЕТСЯ! ЖДЕМ СОЗДАТЕЛЯ КОМНАТЫ
                </span>
            </div>
        </div>
    </main>
</div>
</body>

<script src="/js/auth.js"></script>
<script>
    let gameId = null;
    let refreshInterval = null;
    let maxPlayers = 0;
    let isNavigating = false;
    let retryCount = 0;
    const MAX_RETRIES = 3;
    const BASE_INTERVAL = 500;
    let currentInterval = BASE_INTERVAL;
    let currentGameMode = 'CASUAL';

    document.addEventListener('DOMContentLoaded', function () {
      if (!AuthService.requireAuth()) return;

      gameId = localStorage.getItem('currentGameId');

      if (!gameId) {
        console.error('Game ID не найден в localStorage');
        alert('Ошибка: Вы не подключены к квизу. Пожалуйста, подключитесь сначала.');
        window.location.href = 'connect1.html';
        return;
      }

      if (!/^\d+$/.test(gameId)) {
        console.error('Некорректный Game ID в localStorage:', gameId);
        alert('Ошибка: Некорректный ID квиза. Пожалуйста, подключитесь заново.');
        localStorage.removeItem('currentGameId');
        window.location.href = 'connect1.html';
        return;
      }

      initializeRoom();
      setupEventListeners();
    });

    function initializeRoom() {
      loadRoomFullData().then(roomData => {
        if (roomData) {
          if (roomData.gameMode) {
            currentGameMode = roomData.gameMode;
          }
          if (typeof roomData.participantsNumber === 'number') {
            maxPlayers = roomData.participantsNumber;
            localStorage.setItem('roomData', JSON.stringify(roomData));
            console.log('Максимальное количество игроков установлено:', maxPlayers);
          }
        }

        startFastPolling();
        loadThemeFromLocalStorage();
        updateGameIdDisplay();
      }).catch(error => {
        console.error('Ошибка инициализации комнаты:', error);
        startFastPolling();
        loadThemeFromLocalStorage();
        updateGameIdDisplay();
      });
    }

    function setupEventListeners() {
      document.querySelector('.btn_back').addEventListener('click', function (e) {
        e.preventDefault();
        confirmExit();
      });
    }

    function startFastPolling() {
      if (refreshInterval) {
        clearInterval(refreshInterval);
      }

      refreshInterval = setInterval(loadRoomData, currentInterval);
      console.log(`Запущено быстрое обновление с интервалом ${currentInterval}мс`);
    }

    function adjustPollingInterval(success) {
      if (success) {
        retryCount = 0;
        currentInterval = BASE_INTERVAL;
      } else {
        retryCount++;
        currentInterval = Math.min(BASE_INTERVAL * Math.pow(2, retryCount), 5000);
      }

      startFastPolling();
    }

    function updateGameIdDisplay() {
      const IDElement = document.getElementById('invite-id');
      if (IDElement && gameId) {
        IDElement.textContent = gameId;

        IDElement.style.cursor = 'pointer';
        IDElement.title = 'Кликните для копирования';
        IDElement.addEventListener('click', function () {
          navigator.clipboard.writeText(gameId)
            .then(() => alert('ID квиза скопирован в буфер обмена!'))
            .catch(err => console.error('Ошибка копирования:', err));
        });
      }
    }

    function loadThemeFromLocalStorage() {
      try {
        const themeElement = document.getElementById('quiz-theme');
        if (currentGameMode === 'DUEL') {
          themeElement.textContent = 'Случайные темы';
          return;
        }
        const selectedTopicData = localStorage.getItem('selectedTopic');

        if (selectedTopicData) {
          const selectedTopic = JSON.parse(selectedTopicData);
          themeElement.textContent = selectedTopic.name;
          console.log('Тема загружена из localStorage:', selectedTopic.name);
        } else {
          themeElement.textContent = 'Тема не указана';
          console.warn('Тема не найдена в localStorage');
        }
      } catch (error) {
        console.error('Ошибка загрузки темы из localStorage:', error);
        document.getElementById('quiz-theme').textContent = 'Ошибка загрузки темы';
      }
    }

    async function loadRoomData() {
      try {
        const session = AuthService.getsession();

        console.log('Обновление данных комнаты...', new Date().toLocaleTimeString());

        const response = await fetch('http://localhost:8080/api/game/get/lobby', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + session,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            gameId: parseInt(gameId)
          })
        });

        console.log('Статус ответа:', response.status);

        if (!response.ok) {
          const errorText = await response.text();
          console.error('Ошибка сервера:', response.status, errorText);

          if (response.status === 404 || response.status === 403) {
            alert('Квиз не найден или у вас нет доступа. Пожалуйста, подключитесь заново.');
            localStorage.removeItem('currentGameId');
            window.location.href = 'connect1.html';
            adjustPollingInterval(false);
            return;
          }

          throw new Error(`Ошибка HTTP: ${response.status} - ${errorText}`);
        }

        const responseText = await response.text();
        console.log('Ответ сервера:', responseText);

        if (!responseText) {
          console.warn('Пустой ответ от сервера');
          adjustPollingInterval(false);
          return;
        }

        const lobbyData = JSON.parse(responseText);
        console.log('Парсинг JSON успешен:', lobbyData);

        processRoomData(lobbyData);
        adjustPollingInterval(true);

      } catch (error) {
        console.error('Ошибка загрузки данных комнаты:', error);
        adjustPollingInterval(false);

        if (error.message.includes('404') || error.message.includes('403')) {
          localStorage.removeItem('currentGameId');
          localStorage.removeItem('currentGame');
          localStorage.removeItem('selectedTopic');
          localStorage.removeItem('currentTopicId');
          alert('Ошибка подключения к квизу. Пожалуйста, подключитесь заново.');
          localStorage.removeItem('currentGameId');
          window.location.href = 'connect1.html';
        }
      }
    }

    async function loadRoomFullData() {
      try {
        const session = AuthService.getsession();

        console.log('Загрузка полных данных комнаты...');

        const response = await fetch('http://localhost:8080/api/game/join', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + session,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            session: session,
            gameId: parseInt(gameId)
          })
        });

        if (!response.ok) {
          const errorText = await response.text();
          console.error('Ошибка загрузки данных комнаты:', response.status, errorText);
          return null;
        }

        const roomData = await response.json();
        console.log('Полные данные комнаты:', roomData);

        if (roomData.gameMode) {
          currentGameMode = roomData.gameMode;
        }
        if (typeof roomData.participantsNumber === 'number') {
          maxPlayers = roomData.participantsNumber;
          console.log('Максимальное количество игроков:', maxPlayers);
        }

        return roomData;

      } catch (error) {
        console.error('Ошибка загрузки полных данных комнаты:', error);
        return null;
      }
    }

    function processRoomData(lobbyData) {
      if (lobbyData.gameMode) {
        currentGameMode = lobbyData.gameMode;
      }
      if (typeof lobbyData.participantsNumber === 'number') {
        maxPlayers = lobbyData.participantsNumber;
      }
      displayPlayers(lobbyData);
      checkRoomStatus(lobbyData);
      updateRoomInfo(lobbyData);
    }

    function displayPlayers(lobbyData) {
      const container = document.getElementById('players-container');
      const countElement = document.getElementById('players-count');

      container.innerHTML = '';

      const players = Array.isArray(lobbyData.players)
        ? lobbyData.players
        : (Array.isArray(lobbyData.playersUsernames)
            ? lobbyData.playersUsernames.map(username => ({ username }))
            : []);
      const playerCount = typeof lobbyData.currentParticipantsNumber === 'number'
        ? lobbyData.currentParticipantsNumber
        : players.length;
      const resolvedMaxPlayers = maxPlayers > 0 ? maxPlayers : playerCount;

      if (players.length === 0) {
        container.innerHTML = '<div class="no-players">Нет участников</div>';
        countElement.textContent = `0/${resolvedMaxPlayers}`;
        return;
      }

      players.forEach((player) => {
        const playerElement = document.createElement('div');
        playerElement.className = 'player';
        playerElement.appendChild(createPlayerAvatar(player));
        const nameElement = document.createElement('span');
        nameElement.className = 'player-name';
        nameElement.textContent = player.username;
        if (player.premiumActive) {
          const premiumStar = document.createElement('span');
          premiumStar.className = 'premium-star';
          premiumStar.textContent = '★';
          premiumStar.title = 'QUIZ PREMIUM';
          nameElement.appendChild(premiumStar);
        }
        playerElement.appendChild(nameElement);
        container.appendChild(playerElement);
      });

      countElement.textContent = `${playerCount}/${resolvedMaxPlayers}`;

      console.log(`Обновлен список игроков: ${playerCount}/${resolvedMaxPlayers} участников`);
    }

    function createPlayerAvatar(player) {
      const avatar = document.createElement('span');
      avatar.className = 'player-avatar';
      avatar.textContent = (player.username || '?').charAt(0).toUpperCase();
      avatar.style.cssText = `
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 38px;
        height: 38px;
        margin-right: 12px;
        border-radius: 50%;
        flex: 0 0 38px;
        background: linear-gradient(135deg, #8279CF, #4c4779);
        color: #fff;
        font-weight: 800;
        background-size: cover;
        background-position: center;
      `;
      if (player.avatarUrl) {
        avatar.textContent = '';
        avatar.style.backgroundImage = `url('${player.avatarUrl}')`;
      }
      return avatar;
    }

    function checkRoomStatus(lobbyData) {
      const status = lobbyData.status;
      console.log('Статус комнаты:', status);

      const statusElement = document.getElementById('room-status');
      if (statusElement) {
        if (currentGameMode !== 'CASUAL' && currentGameMode !== 'TRUE_FALSE' && currentGameMode !== 'DUEL') {
          statusElement.textContent = `Режим ${currentGameMode} пока недоступен для запуска из этой комнаты.`;
          statusElement.className = 'room-status waiting';
          return;
        }
        if (status === 'WAITING' || status === 'CREATED') {
          statusElement.textContent = 'КВИЗ СКОРО НАЧНЕТСЯ! ЖДЕМ СОЗДАТЕЛЯ КОМНАТЫ';
          statusElement.className = 'room-status waiting';
        } else if (status === 'IN_PROGRESS' || status === 'STARTED') {
          statusElement.textContent = 'КВИЗ НАЧАЛСЯ! ПЕРЕХОДИМ К ВОПРОСАМ...';
          statusElement.className = 'room-status started';
          if (currentGameMode === 'DUEL') {
            redirectToDuel();
          } else {
            redirectToQuiz();
          }
        } else if (status === 'ENDED') {
          statusElement.textContent = 'КВИЗ ЗАВЕРШЕН';
          statusElement.className = 'room-status ended';
        }
      }
    }

    function redirectToQuiz() {
      if (isNavigating) return;

      isNavigating = true;

      if (refreshInterval) {
        clearInterval(refreshInterval);
      }

      console.log('Квиз начался! Переходим к вопросам...');
      window.location.href = `question.html?gameId=${gameId}`;
    }

    function redirectToDuel() {
      if (isNavigating) return;
      isNavigating = true;

      if (refreshInterval) {
        clearInterval(refreshInterval);
      }

      window.location.href = `duel.html?gameId=${gameId}`;
    }

    function updateRoomInfo(lobbyData) {
      const linkElement = document.getElementById('invite-link');
      if (linkElement && linkElement.textContent === 'Загрузка...') {
        linkElement.textContent = `${window.location.origin}/connect1.html`;

        linkElement.style.cursor = 'pointer';
        linkElement.title = 'Кликните для копирования';
        linkElement.addEventListener('click', function () {
          navigator.clipboard.writeText(`ID квиза: ${gameId}`)
            .then(() => alert('ID квиза скопирован в буфер обмена!'))
            .catch(err => console.error('Ошибка копирования:', err));
        });
      }
    }

    function confirmExit() {
      const confirmed = confirm('Вы уверены, что хотите выйти из комнаты?');

      if (confirmed) {
        leaveRoom();
      }
    }

    async function leaveRoom() {
      try {
        const session = AuthService.getsession();

        const response = await fetch('http://localhost:8080/api/user/leave', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + session,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            session: session
          })
        });

        console.log('Статус ответа на выход:', response.status);

        if (!response.ok) {
          const errorText = await response.text();
          console.error('Ошибка сервера при выходе:', response.status, errorText);
          throw new Error(`Ошибка HTTP: ${response.status} - ${errorText}`);
        }

        console.log('Успешно вышел из комнаты');

      } catch (error) {
        console.error('Ошибка выхода из комнаты:', error);
        alert('Произошла ошибка при выходе из комнаты: ' + error.message);
      } finally {
        if (refreshInterval) {
          clearInterval(refreshInterval);
        }

        localStorage.removeItem('currentGameId');
        localStorage.removeItem('currentGame');
        localStorage.removeItem('selectedTopic');
        localStorage.removeItem('currentTopicId');

        window.location.href = 'connect1.html';
      }
    }

    window.addEventListener('beforeunload', function () {
      if (refreshInterval) {
        clearInterval(refreshInterval);
      }
    });

    window.addEventListener('unload', function () {
      if (refreshInterval) {
        clearInterval(refreshInterval);
      }
    });
</script>

</html>

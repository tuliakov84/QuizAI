<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/styles/main_style.css">
  <title>QUIZAI</title>
</head>

<body>
<div class="main_cont">
  <div class="coin-badge" aria-label="Баланс коинов">
    <span>КОИНЫ</span>
    <strong id="main-user-coins">...</strong>
  </div>
  <div class="leftdiv">
    <div class="h1_div">
      <h1 class="h11">QUIZ AI</h1>
      <h1 class="h12">ARENA</h1>
    </div>
    <a href="profile.html" class="btnl">ПРОФИЛЬ</a>
    <a href="raiting.html" class="btnl">РЕЙТИНГ ИГРОКОВ</a>
    <a href="exit.html" class="btnl">ВЫЙТИ</a>
  </div>
  <div class="rightdiv">
    <h1 class="h13">ВНИМАНИЕ! ВОПРОС!</h1>
    <a href="connect1.html" class="btnr">ПРИСОЕДИНИТЬСЯ К КВИЗУ!</a>
    <a href="modesToThemesToCreate.html" class="btnr">СОЗДАТЬ СВОЙ КВИЗ!</a>
  </div>
</div>
</body>

<script src="/js/auth.js"></script>
<script src="/js/checkAchievements.js"></script>
<script src="/js/checkCurrentGame.js"></script>
<script>
  // Проверяем авторизацию при загрузке главной страницы
  document.addEventListener('DOMContentLoaded', async function () {
    if (!AuthService.requireAuth()) return;
    checkCurrentGame();


    session = localStorage.getItem('session');
    if (session) {
      checkAndAttachAchievements(session);
    }
    try {
      const userData = await AuthService.loadUserProfile() || AuthService.getUser();
      if (userData) {
        console.log('Добро пожаловать, ' + userData.username);
        document.getElementById('main-user-coins').textContent = userData.coinBalance ?? 0;
      }
    } catch (error) {
      console.error('Ошибка загрузки данных пользователя:', error);
    }
  });
</script>

</html>

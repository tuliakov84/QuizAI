<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/modes_style.css">
    <title>QUIZAI</title>
</head>

<body>
<div class="main_cont">
    <header>
        <a href="connect1.html" class="btn_back">НАЗАД</a>
        <h1 class="h11">QUIZ AI ARENA</h1>
    </header>

    <p class="h12">ВЫБЕРИТЕ РЕЖИМ КВИЗА</p>

    <main>
        <div class="modes">
            <div class="panel-badge">MODES</div>
            <span>ДОСТУПНЫЕ РЕЖИМЫ</span>
            <div id="modes-container" class="modes-grid">
                <!-- Темы будут загружены через JavaScript -->
            </div>
        </div>
    </main>
</div>

<script src="/js/auth.js"></script>
<script src="/js/checkCurrentGame.js"></script>
<script>
    let availableTopics = [];

    document.addEventListener('DOMContentLoaded', function () {

        loadTopics();
    });

    async function loadTopics() {
        try {
            showLoadingMessage('Загрузка тем...');

            availableTopics = [
                "КАЗУАЛ",
                "ПРАВДА ИЛИ ЛОЖЬ",
                "ДУЭЛЬ",
                "РАНДОМ",
                "СВОЯК"
            ]
            displayTopics(availableTopics);

        } catch (error) {
            console.error('Ошибка загрузки тем:', error);
            showErrorMessage('Ошибка загрузки тем');
        }
    }

    function displayTopics(topics) {
        const container = document.getElementById('modes-container');
        container.innerHTML = '';

        topics.forEach(topic => {
            const topicElement = document.createElement('div');
            topicElement.className = 'mode-btn';
            topicElement.innerHTML = `
            <div class="mode-content btn">
                <div class="mode-chip">CHOOSE WISELY</div>
                <h3>${topic}</h3>
            </div>
        `;

            topicElement.addEventListener('click', () => selectTopic(topic));
            container.appendChild(topicElement);
        });
    }

    function selectTopic(topic) {
        localStorage.setItem('selectedMode', JSON.stringify(topic));
        console.log('Выбрана режим:', topic);
        if (topic === "КАЗУАЛ" | topic === "ПРАВДА ИЛИ ЛОЖЬ") {
            window.location.href = 'themesToJoin.html';
        } else {
            window.location.href = 'connect2.html';
        }
    }

    function showLoadingMessage(text) {
        const container = document.getElementById('modes-container');
        container.innerHTML = `<div class="loading-message">${text}</div>`;
    }

    function showErrorMessage(text) {
        const container = document.getElementById('modes-container');
        container.innerHTML = `<div class="error-message">${text}</div>`;
    }
</script>
</body>

</html>

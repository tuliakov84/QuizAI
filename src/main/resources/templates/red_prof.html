                <p class="panel-subtitle">Обновите пароль, статус и персональную аватарку</p>

                </div> -->

            <div class="input-group">
                <label for="password-input">Новый пароль:</label>

            </div>

            <div class="input-group">
                <label for="confirm-password-input">Подтвердите пароль:</label>
                <input type="password" id="confirm-password-input" class="text-input" placeholder="Подтвердите новый пароль">
            </div>

            <div class="input-group">
                <label for="status-input">Статус:</label>
                <input type="text" id="status-input" class="text-input" placeholder="Введите новый статус">
            </div>

            <button class="btnr" onclick="saveProfile()">СОХРАНИТЬ</button>
        </div>
    </div>

    <div class="leftdiv"></div>
</div>

<div id="app-notification" class="app-notification hidden">
    <div class="app-notification__content">
        <div class="app-notification__icon" id="app-notification-icon">!</div>
        <div class="app-notification__text" id="message"></div>
        <button type="button" class="app-notification__close" id="app-notification-close">&times;</button>
    </div>
</div>

    let currentUserData = null;
    let selectedAvatarId = null;
    let selectedAvatarFile = null;
    let selectedAvatarObjectUrl = null;

    document.addEventListener('DOMContentLoaded', function () {
      if (!AuthService.requireAuth()) return;
      checkCurrentGame();
      loadCurrentUserData();

      const closeBtn = document.getElementById('app-notification-close');
      closeBtn.addEventListener('click', hideNotification);

      const avatarInput = document.getElementById('custom-avatar-input');
      avatarInput.addEventListener('change', handleAvatarFileChange);

      // loadAvailableAvatars();
    });

    async function loadCurrentUserData() {
      try {
        currentUserData = await AuthService.loadUserProfile() || AuthService.getUser();
        if (currentUserData) {
          document.getElementById('status-input').value = currentUserData.description || '';
          displayCurrentAvatar(currentUserData);
        }
      } catch (error) {
        console.error('Ошибка загрузки данных пользователя:', error);
        showMessage('Ошибка загрузки данных', 'error');
      }
    }

    function displayCurrentAvatar(userData) {
      const avatarPreview = document.getElementById('avatar-preview');
      AuthService.displayAvatarElement(avatarPreview, userData || {});
    }

    function handleAvatarFileChange(event) {
      const file = event.target.files[0];
      if (!file) return;

      const allowedTypes = ['image/jpeg', 'image/png', 'image/webp'];
      if (!allowedTypes.includes(file.type)) {
        event.target.value = '';
        showMessage('Поддерживаются только PNG, JPG и WebP', 'error');
        return;
      }

      if (file.size > 5 * 1024 * 1024) {
        event.target.value = '';
        showMessage('Аватарка должна быть не больше 5 МБ', 'error');
        return;
      }

      if (selectedAvatarObjectUrl) {
        URL.revokeObjectURL(selectedAvatarObjectUrl);
      }

      selectedAvatarFile = file;
      selectedAvatarObjectUrl = URL.createObjectURL(file);
      selectedAvatarId = null;
      displayCurrentAvatar({
        username: currentUserData?.username,
        avatarUrl: selectedAvatarObjectUrl
      });
      showMessage('Аватарка выбрана. Нажмите «Сохранить», чтобы загрузить ее.', 'info');
    }

    async function saveProfile() {
      const password = document.getElementById('password-input').value.trim();
      const confirmPassword = document.getElementById('confirm-password-input').value.trim();
      const description = document.getElementById('status-input').value.trim();
      const existingDescription = currentUserData?.description || '';

      if (password || confirmPassword) {
        if (password !== confirmPassword) {
          showMessage('Пароли не совпадают', 'error');
          return;
        }

        if (password.length < 6) {
          showMessage('Пароль должен быть не менее 6 символов', 'error');
          return;
        }

        if (!/(?=.*[a-z])(?=.*[A-Z])(?=.*\d)/.test(password)) {
          showMessage('Пароль должен содержать хотя бы одну заглавную букву, одну строчную букву и одну цифру', 'error');
          return;
        }
      }

      if (description.length > 100) {
        showMessage('Статус не должен превышать 100 символов', 'error');
        return;
      }

      try {
        showMessage('Сохранение...', 'info');

        const session = AuthService.getsession();
        let hasChanges = false;
        let successCount = 0;
        const descriptionChanged = description !== existingDescription;
        const avatarChanged = Boolean(selectedAvatarFile);
        const totalChanges = (password ? 1 : 0) +
          (descriptionChanged ? 1 : 0) +
          (avatarChanged ? 1 : 0);

        if (avatarChanged) {
          try {
            currentUserData = await AuthService.uploadCustomAvatar(selectedAvatarFile);
            selectedAvatarFile = null;
            if (selectedAvatarObjectUrl) {
              URL.revokeObjectURL(selectedAvatarObjectUrl);
              selectedAvatarObjectUrl = null;
            }
            successCount++;
            hasChanges = true;
            showMessage('Аватарка успешно обновлена', 'success');
          } catch (error) {
            console.error('Ошибка обновления аватара:', error);
            showMessage('Ошибка обновления аватара: ' + error.message, 'error');
            return;
          }
        }

        if (descriptionChanged) {
          try {
            const descResponse = await fetch('http://localhost:8080/api/users/set/description', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                session: session,
                description: description
              })
            });

            if (descResponse.ok) {
              successCount++;
              hasChanges = true;
              showMessage('Статус успешно обновлен', 'success');
            } else {
              const errorText = await descResponse.text();
              throw new Error(errorText || `Ошибка обновления статуса: ${descResponse.status}`);
            }
          } catch (error) {
            console.error('Ошибка обновления статуса:', error);
            showMessage('Ошибка обновления статуса: ' + error.message, 'error');
            return;
          }
        }

        if (password) {
          try {
            const passwordResponse = await fetch('http://localhost:8080/api/users/set/password', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                session: session,
                password: password
              })
            });

            if (passwordResponse.ok) {
              successCount++;
              hasChanges = true;
              showMessage('Пароль успешно обновлен', 'success');

              document.getElementById('password-input').value = '';
              document.getElementById('confirm-password-input').value = '';
            } else {
              const errorText = await passwordResponse.text();
              throw new Error(errorText || `Ошибка обновления пароля: ${passwordResponse.status}`);
            }
          } catch (error) {
            console.error('Ошибка обновления пароля:', error);
            showMessage('Ошибка обновления пароля: ' + error.message, 'error');
            return;
          }
        }

        if (hasChanges) {
          const updatedUserData = {
            ...(AuthService.getUser() || currentUserData || {}),
            description: description
          };
          currentUserData = updatedUserData;
          localStorage.setItem('user', JSON.stringify(updatedUserData));

          showMessage(`Профиль успешно обновлен! (${successCount}/${totalChanges} изменений)`, 'success');

          setTimeout(() => {
            window.location.href = 'profile.html';
          }, 2000);
        } else {
          showMessage('Нет изменений для сохранения', 'info');
        }

      } catch (error) {
        console.error('Ошибка сохранения профиля:', error);
        showMessage('Ошибка сохранения профиля: ' + error.message, 'error');
      }
    }

    function showMessage(text, type) {
      const messageElement = document.getElementById('message');
      const notification = document.getElementById('app-notification');
      const icon = document.getElementById('app-notification-icon');

      clearTimeout(notificationTimeout);

      messageElement.textContent = text;
      notification.className = 'app-notification';
      notification.classList.remove('hidden');
      notification.classList.add(type);

      if (type === 'success') {
        icon.textContent = '✓';
      } else if (type === 'info') {
        icon.textContent = 'i';
      } else {
        icon.textContent = '!';
      }

      if (type === 'info' || type === 'success') {
        notificationTimeout = setTimeout(() => {
          hideNotification();
        }, 3000);
      }
    }

    function hideNotification() {
      const notification = document.getElementById('app-notification');
      notification.classList.add('hidden');
    }
</script>

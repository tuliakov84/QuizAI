<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles/reg_style.css">
    <title>Сброс пароля</title>
</head>

<body>
<div class="main_cont">
    <header>
        <h1>QUIZ AI</h1>
        <p>СБРОС ПАРОЛЯ</p>
    </header>

    <main>
        <div class="main_rect">
            <div class="form-badge">SECURE RESET</div>

            <div class="name">
                <span>ПОЧТА</span>
                <div class="input-group">
                    <input type="email" name="email" placeholder="you@example.com" required>
                </div>
            </div>

            <div class="password">
                <span>НОВЫЙ ПАРОЛЬ</span>
                <div class="input-group">
                    <input type="password" name="password1" placeholder="Новый пароль" required>
                </div>
            </div>

            <div class="password">
                <span>ПОВТОРИТЕ НОВЫЙ ПАРОЛЬ</span>
                <div class="input-group">
                    <input type="password" name="password2" placeholder="Повторите новый пароль" required>
                </div>
            </div>

            <div class="enter">
                <button type="button" class="btn" id="request-code-btn">ОТПРАВИТЬ КОД</button>
            </div>

            <div class="password" id="code-block" style="display: none;">
                <span>КОД ИЗ ПИСЬМА</span>
                <div class="input-group">
                    <input type="text" name="code" placeholder="Введите код" maxlength="8">
                </div>
            </div>

            <div class="enter" id="confirm-block" style="display: none;">
                <button type="button" class="btn" id="confirm-btn">СБРОСИТЬ ПАРОЛЬ</button>
            </div>

            <div class="ent_href">
                <a href="index.html">Вернуться ко входу</a>
            </div>
        </div>
    </main>
</div>
</body>

<script>
    document.addEventListener('DOMContentLoaded', function () {
      const requestCodeBtn = document.getElementById('request-code-btn');
      const confirmBtn = document.getElementById('confirm-btn');
      const codeBlock = document.getElementById('code-block');
      const confirmBlock = document.getElementById('confirm-block');
      const emailInput = document.querySelector('input[name="email"]');
      const password1Input = document.querySelector('input[name="password1"]');
      const password2Input = document.querySelector('input[name="password2"]');
      const codeInput = document.querySelector('input[name="code"]');

      async function requestOtp(e) {
        e.preventDefault();

        const email = emailInput.value.trim();
        const password1 = password1Input.value;
        const password2 = password2Input.value;

        if (!email || !password1 || !password2) {
          alert('Пожалуйста, заполните все поля');
          return;
        }

        if (password1 !== password2) {
          alert('Пароли не совпадают');
          return;
        }

        if (password1.length < 8) {
          alert('Пароль должен быть не менее 8 символов и соответствовать правилам безопасности');
          return;
        }

        try {
          requestCodeBtn.textContent = 'ОТПРАВКА...';
          requestCodeBtn.disabled = true;

          const response = await fetch('/api/auth/password-reset/request-otp', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              email: email,
              password: password1
            })
          });
          const data = await response.json();

          if (!response.ok) {
            alert('Ошибка сброса: ' + (data.message || `Ошибка ${response.status}`));
            return;
          }

          sessionStorage.setItem('pendingPasswordResetEmail', email);
          codeBlock.style.display = 'block';
          confirmBlock.style.display = 'block';
          alert('Код отправлен на почту. Введите его, чтобы подтвердить смену пароля.');
        } catch (error) {
          console.error('Password reset request error:', error);
          alert('Ошибка соединения с сервером: ' + error.message);
        } finally {
          requestCodeBtn.textContent = 'ОТПРАВИТЬ КОД';
          requestCodeBtn.disabled = false;
        }
      }

      async function confirmReset(e) {
        e.preventDefault();

        const email = sessionStorage.getItem('pendingPasswordResetEmail') || emailInput.value.trim();
        const code = codeInput.value.trim();

        if (!email || !code) {
          alert('Введите код из письма');
          return;
        }

        try {
          confirmBtn.textContent = 'ПРОВЕРКА...';
          confirmBtn.disabled = true;

          const response = await fetch('/api/auth/password-reset/confirm', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              email: email,
              code: code
            })
          });
          const data = await response.json();

          if (!response.ok) {
            alert('Ошибка подтверждения: ' + (data.message || `Ошибка ${response.status}`));
            return;
          }

          sessionStorage.removeItem('pendingPasswordResetEmail');
          alert('Пароль обновлен. Теперь можно войти с новым паролем.');
          window.location.href = 'index.html';
        } catch (error) {
          console.error('Password reset confirm error:', error);
          alert('Ошибка соединения с сервером: ' + error.message);
        } finally {
          confirmBtn.textContent = 'СБРОСИТЬ ПАРОЛЬ';
          confirmBtn.disabled = false;
        }
      }

      requestCodeBtn.addEventListener('click', requestOtp);
      confirmBtn.addEventListener('click', confirmReset);

      document.querySelectorAll('input').forEach(input => {
        input.addEventListener('keypress', function (e) {
          if (e.key === 'Enter') {
            if (codeBlock.style.display === 'block' && input.name === 'code') {
              confirmReset(e);
            } else {
              requestOtp(e);
            }
          }
        });
      });
    });
</script>

</html>

<script src="/js/auth.js"></script>
<script src="/js/checkCurrentGame.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', async function () {
      if (!AuthService.requireAuth()) return;
      await checkCurrentGame();

      await loadQuizHistory();
    });

    async function loadQuizHistory() {
      const session = AuthService.getsession();
      if (!session) {
        console.error('Сессия не найдена');
        showError('Сессия не найдена. Пожалуйста, войдите заново.');
        return;
      }

      try {
        const topicsResponse = await fetch('http://localhost:8080/api/topic/get-all', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({})
        });

        if (!topicsResponse.ok) {
          throw new Error(`Ошибка загрузки тем: ${topicsResponse.status}`);
        }

        const topics = await topicsResponse.json();
        const topicMap = {};
        topics.forEach(topic => {
          // ✅ Исправлено: topic.name вместо topic.topicName
          topicMap[topic.topicId] = topic.name || `Тема ${topic.topicId}`;
        });

        const gamesResponse = await fetch('http://localhost:8080/api/users/get-games', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session: session })
        });

        if (!gamesResponse.ok) {
          throw new Error(`Ошибка загрузки игр: ${gamesResponse.status}`);
        }

        const games = await gamesResponse.json();
        console.log('Темы:', topics);
        console.log('Игры:', games);
        displayQuizHistory(games, topicMap);

      } catch (error) {
        console.error('Ошибка загрузки истории:', error);
        showError('Не удалось загрузить историю квизов. Попробуйте позже.');
      }
    }

    function displayQuizHistory(games, topicMap) {
      const gamesContainer = document.querySelector('.games');
      const template = document.querySelector('.game');

      const existingGames = gamesContainer.querySelectorAll('.game');
      for (let i = 1; i < existingGames.length; i++) {
        existingGames[i].remove();
      }

      if (!games || games.length === 0) {
        const noGamesMessage = document.createElement('div');
        noGamesMessage.className = 'no-games-message';
        noGamesMessage.textContent = 'У вас пока нет завершённых квизов';
        noGamesMessage.style.cssText = `
          text-align: center;
          padding: 20px;
          color: #666;
          background: #f9f9f9;
          border-radius: 8px;
          margin-top: 20px;
        `;
        gamesContainer.appendChild(noGamesMessage);
        template.style.display = 'none';
        return;
      }

      games.forEach(game => {
        const gameElement = template.cloneNode(true);
        gameElement.style.display = '';

        const topicName = topicMap[game.topicId] || `Тема ${game.topicId}`;
        console.log('topicMap:', topicMap);

        const themeElement = gameElement.querySelector('.h13:first-child');
        const resultElement = gameElement.querySelector('.h13:nth-child(2)');
        const answersButton = gameElement.querySelector('.btn');

        if (themeElement) themeElement.textContent = topicName;
        if (resultElement) resultElement.textContent = `${game.numberOfQuestions} вопросов`;

        if (answersButton) {
          answersButton.href = `answers.html?gameId=${game.gameId}`;
          answersButton.textContent = 'ОТВЕТЫ';
        }

        gamesContainer.insertBefore(gameElement, template.nextSibling);
      });

      template.style.display = 'none';
    }

    function showError(message) {
      const errorElement = document.createElement('div');
      errorElement.className = 'error-message';
      errorElement.textContent = message;
      errorElement.style.cssText = `
        background-color: #ffebee;
        color: #c62828;
        padding: 15px;
        margin: 10px 0;
        border-radius: 5px;
        text-align: center;
        border: 1px solid #ffcdd2;
      `;
      const header = document.querySelector('header');
      header.parentNode.insertBefore(errorElement, header.nextSibling);
      setTimeout(() => errorElement.remove(), 5000);
    }

    window.refreshHistory = async function() {
      const errorMsg = document.querySelector('.error-message');
      if (errorMsg) errorMsg.remove();
      const noGamesMsg = document.querySelector('.no-games-message');
      if (noGamesMsg) noGamesMsg.remove();
      await loadQuizHistory();
    };
</script>

<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/question_style.css">
    <title>QUIZAI</title>
</head>

<body>
<div class="main_cont">
    <header>
        <div class="h12">
            ВРЕМЯ НА ВОПРОС
        </div>
        <div class="timer">
            <div class="currenttime">
            </div>
        </div>
    </header>

    <main>
        <div class="question">
            <div class="h13" id="question-text">Загрузка вопроса...</div>
        </div>
        <div class="answers" id="answers-container">
            <!-- Ответы будут загружены через JavaScript -->
        </div>
    </main>
</div>
</body>

<script src="/js/auth.js"></script>
<script>
    let timeTaken;
    let gameId = null;
    let currentQuestionNumber = 1;
    let totalQuestions;
    let timeLeft = 30;
    let timerWorker = null;
    let answerSubmitted = false;
    let selectedAnswer = null;
    let questionStartTime = null;
    let animationFrameId = null;
    let currentQuestionData = null;
    let levelDifficulty = null;
    let timePerQuestion = 30; // по умолчанию 30 секунд

    document.addEventListener('DOMContentLoaded', async function () {
        if (!AuthService.requireAuth()) return;

        const urlParams = new URLSearchParams(window.location.search);
        gameId = urlParams.get('gameId');

        if (!gameId) {
            console.error('Game ID не найден в URL');
            return;
        }

        // Получаем информацию об игре из localStorage (количество вопросов, сложность)
        try {
            const roomDataString = localStorage.getItem('roomData');
            if (roomDataString) {
                const roomData = JSON.parse(roomDataString);
                totalQuestions = roomData.numberOfQuestions;
                levelDifficulty = roomData.levelDifficulty;
            } else {
                console.warn('roomData отсутствует в localStorage');
            }
        } catch (error) {
            console.error('Ошибка загрузки roomData:', error);
        }

        // Получаем данные о текущей игре (gameStartTime) для вычисления номера вопроса и оставшегося времени
        let gameStartTime = null;
        try {
            const session = AuthService.getsession();
            const response = await fetch('http://localhost:8080/api/users/get-current-game', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + session,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ session: session })
            });

            if (!response.ok) {
                console.error('Ошибка получения текущей игры');
                return;
            }

            const gameData = await response.json();
            gameStartTime = gameData.gameStartTime;

            const startTime = new Date(gameStartTime).getTime();
            const diff = Date.now() - startTime;
            const questionDurationMs = timePerQuestion * 1000;

            currentQuestionNumber = Math.floor(diff / questionDurationMs) + 1;
            const elapsedInCurrent = diff % questionDurationMs;
            timeLeft = (questionDurationMs - elapsedInCurrent) / 1000;

            if (timeLeft <= 0) {
                // Если время вышло, возможно, вопрос уже завершён – переходим к следующему
                console.warn('Время на текущий вопрос истекло');
                timeLeft = 0;
            }

            console.log(`Номер вопроса: ${currentQuestionNumber}, осталось времени: ${timeLeft.toFixed(1)} сек`);
        } catch (error) {
            console.error('Ошибка при проверке текущей игры:', error);
            return;
        }

        // Инициализация Web Worker для точного таймера
        try {
            timerWorker = new Worker('js/timer-worker.js');
            timerWorker.onmessage = function(e) {
                if (e.data.type === 'timeout') {
                    handleTimeout();
                } else if (e.data.type === 'tick') {
                    timeLeft = e.data.remainingMs / 1000;
                    updateTimerDisplay();
                }
            };
        } catch (error) {
            console.error('Web Worker не поддерживается:', error);
        }

        // Загружаем вопрос
        await loadQuestion();

        // Запускаем таймер с вычисленным оставшимся временем
        startTimer(timeLeft);
    });

    async function loadQuestion() {
        try {
            answerSubmitted = false;
            selectedAnswer = null;

            const session = AuthService.getsession();

            const response = await fetch('http://localhost:8080/api/game/get/question', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + session,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    gameId: parseInt(gameId),
                    questionNumber: currentQuestionNumber
                })
            });

            if (!response.ok) {
                throw new Error(`Ошибка HTTP: ${response.status}`);
            }

            const questionData = await response.json();
            currentQuestionData = questionData;

            displayQuestion(questionData);
        } catch (error) {
            console.error('Ошибка загрузки вопроса:', error);
            // При ошибке переходим на следующий вопрос через 30 секунд
            setTimeout(() => goToNextQuestion(), 30000);
        }
    }

    function displayQuestion(question) {
        document.getElementById('question-text').textContent = question.questionText || "Вопрос не загружен";

        const answersContainer = document.getElementById('answers-container');
        answersContainer.innerHTML = '';

        const answers = [
            { text: question.answer1, number: 1 },
            { text: question.answer2, number: 2 },
            { text: question.answer3, number: 3 },
            { text: question.answer4, number: 4 }
        ];

        answers.forEach((answer) => {
            if (answer.text && answer.text.trim() !== '') {
                const answerBtn = document.createElement('a');
                answerBtn.href = '#';
                answerBtn.className = 'btn';
                answerBtn.textContent = `${answer.number}. ${answer.text}`;
                answerBtn.dataset.answerNumber = answer.number;

                answerBtn.addEventListener('click', function (e) {
                    e.preventDefault();
                    if (!answerSubmitted) {
                        selectAnswer(answer.number);
                    }
                });

                answersContainer.appendChild(answerBtn);
            }
        });

        if (answersContainer.children.length === 0) {
            const errorMessage = document.createElement('div');
            errorMessage.className = 'error-message';
            errorMessage.textContent = 'Ответы не загружены';
            answersContainer.appendChild(errorMessage);
        }

        console.log(`Вопрос ${currentQuestionNumber}/${totalQuestions} загружен`);
    }

    function selectAnswer(answerNumber) {
        timeTaken = Date.now() - questionStartTime; // Время, затраченное на ответ
        if (answerSubmitted) return;

        selectedAnswer = answerNumber;
        answerSubmitted = true;

        const answerButtons = document.querySelectorAll('.btn');
        answerButtons.forEach(btn => {
            btn.classList.remove('selected');
            if (parseInt(btn.dataset.answerNumber) === answerNumber) {
                btn.classList.add('selected');
            }
        });

        disableAllAnswers();
        console.log(`Выбран ответ: ${answerNumber}`);
        // Ответ будет отправлен по истечении таймера или при его ручном нажатии?
        // В текущей логике ответ отправляется только по окончании таймера.
        // Если нужно отправлять сразу – добавьте вызов submitAnswer(answerNumber).
    }

    function disableAllAnswers() {
        const answerButtons = document.querySelectorAll('.btn');
        answerButtons.forEach(btn => {
            btn.classList.add('disabled-answer');
        });
    }

    function startTimer(initialTimeLeft) {
        questionStartTime = Date.now();
        timeLeft = initialTimeLeft;
        updateTimerDisplay();

        if (timeLeft <= 0) {
            handleTimeout();
            return;
        }

        if (timerWorker) {
            timerWorker.postMessage({
                action: 'start',
                duration: timeLeft * 1000
            });
        } else {
            startFallbackTimer();
        }
    }

    function startFallbackTimer() {
        const startTime = Date.now();
        const endTime = startTime + (timeLeft * 1000);

        function updateTimer() {
            const now = Date.now();
            const remainingTime = endTime - now;

            if (remainingTime <= 0) {
                handleTimeout();
                return;
            }

            timeLeft = remainingTime / 1000;
            updateTimerDisplay();

            animationFrameId = requestAnimationFrame(updateTimer);
        }

        animationFrameId = requestAnimationFrame(updateTimer);
    }

    function handleTimeout() {
        console.log('Время вышло!');

        if (timerWorker) {
            timerWorker.postMessage('stop');
        }
        if (animationFrameId) {
            cancelAnimationFrame(animationFrameId);
        }

        timeLeft = 0;
        updateTimerDisplay();

        if (!answerSubmitted) {
            selectedAnswer = 0; // 0 означает, что ответ не был выбран
            answerSubmitted = true;
        }

        setTimeout(() => {
            submitAnswer(selectedAnswer);
        }, 500);
    }

    function updateTimerDisplay() {
        const timerElement = document.querySelector('.currenttime');
        const percentage = (timeLeft / timePerQuestion) * 100;
        timerElement.style.width = `${Math.max(0, percentage)}%`;

        if (timeLeft <= timePerQuestion * 0.25) {
            timerElement.style.backgroundColor = '#ff5252';
        } else if (timeLeft <= timePerQuestion * 0.5) {
            timerElement.style.backgroundColor = '#ffa726';
        } else {
            timerElement.style.backgroundColor = '#4CAF50';
        }

        timerElement.style.transition = 'width 0.05s linear, background-color 0.3s ease';

        const timerText = document.querySelector('.timer-text');
        if (timerText) {
            timerText.textContent = Math.ceil(timeLeft) + 'с';
        }
    }

    async function submitAnswer(answerNumber) {
        try {
            const session = AuthService.getsession();
            console.log(`Отправка ответа: ${answerNumber}, время: ${timeTaken / 1000}, сложность: ${levelDifficulty}`);

            let difficultyEnum = 'MEDIUM';
            if (levelDifficulty === 1) difficultyEnum = 'EASY';
            else if (levelDifficulty === 3) difficultyEnum = 'HARD';

            const response = await fetch('http://localhost:8080/api/game/verify-answer', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + session,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    gameId: parseInt(gameId),
                    questionNumber: currentQuestionNumber,
                    submittedAnswerNumber: answerNumber,
                    timeTakenToAnswerInSeconds: timeTaken / 1000,
                    session: session,
                    levelDifficulty: difficultyEnum,
                    questionId: currentQuestionData ? currentQuestionData.questionId : 0
                })
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`Ошибка HTTP: ${response.status}: ${errorText}`);
            }

            console.log('Ответ успешно отправлен');
            setTimeout(() => goToNextQuestion(), 2000);
        } catch (error) {
            console.error('Ошибка отправки ответа:', error);
            showErrorMessage('Ошибка отправки ответа');
            setTimeout(() => goToNextQuestion(), 2000);
        }
    }

    function showErrorMessage(message) {
        const answersContainer = document.getElementById('answers-container');
        const errorMessage = document.createElement('div');
        errorMessage.className = 'error-message';
        errorMessage.textContent = message;
        answersContainer.appendChild(errorMessage);
    }

    function goToNextQuestion() {
        currentQuestionNumber++;

        if (currentQuestionNumber <= totalQuestions) {
            window.location.href = `question.html?gameId=${gameId}`;
        } else {
            console.log('Квиз завершен! Переход к результатам...');
            window.location.href = `results.html?gameId=${gameId}`;
        }
    }

    window.addEventListener('beforeunload', function () {
        if (timerWorker) timerWorker.terminate();
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
    });

    document.addEventListener('visibilitychange', function() {
        if (document.hidden && !answerSubmitted) {
            console.log('Страница скрыта! Возможна попытка читерства.');
        }
    });
</script>
</html>

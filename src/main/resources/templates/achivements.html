<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles/achivements_style.css">
    <title>QUIZAI - Достижения</title>
</head>
<body>
<div class="main_cont">
    <header>
        <a href="profile.html" class="btn_back">НАЗАД</a>
        <h1 class="h11">QUIZ AI ARENA</h1>
    </header>

    <p class="h12">ЕЩЁ ОДНО ДОСТИЖЕНИЕ — ВАШ ШАГ К ПОБЕДЕ</p>

    <main>
        <div class="achivements" id="achievements-container">
            <!-- Сюда будут загружены достижения -->
            <div class="loading loading-pulse">Загрузка достижений...</div>
        </div>
    </main>
</div>

<script src="/js/auth.js"></script>
<script src="/js/checkCurrentGame.js"></script>
<script src="/js/achievements.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        if (!AuthService.requireAuth()) return;
        checkCurrentGame();
        loadData();
        session = localStorage.getItem('session');
        if (session) {
            checkAndAttachAchievements(session);
        }
    });

    async function loadData() {
        const container = document.getElementById('achievements-container');
        try {
            const session = AuthService.getsession();
            if (!session) throw new Error('Сессия не найдена');

            const profileResponse = await fetch('http://localhost:8080/api/users/profile', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + session,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ session: session })
            });
            if (!profileResponse.ok) throw new Error(`Ошибка загрузки профиля: ${profileResponse.status}`);
            const profile = await profileResponse.json();
            const completedIds = profile.achievements || [];

            const allResponse = await fetch('http://localhost:8080/api/achievement/get-all', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + session,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({})
            });
            if (!allResponse.ok) throw new Error(`Ошибка загрузки всех достижений: ${allResponse.status}`);
            const allAchievements = await allResponse.json();

            displayAchievements(allAchievements, completedIds);
        } catch (error) {
            console.error('Ошибка загрузки достижений:', error);
            container.innerHTML = '<div class="error-message">Не удалось загрузить достижения</div>';
        }
    }

    function displayAchievements(allAchievements, completedIds) {
        const container = document.getElementById('achievements-container');
        container.innerHTML = '';

        if (!allAchievements || allAchievements.length === 0) {
            container.innerHTML = '<div class="no-achievements-message">Достижения отсутствуют</div>';
            return;
        }

        const completedSet = new Set(completedIds);

        allAchievements.forEach(achievement => {
            const achivElement = document.createElement('div');
            achivElement.className = 'achivement';

            if (completedSet.has(achievement.achievementId)) {
                achivElement.classList.add('completed');
            } else {
                achivElement.classList.add('not-completed');
            }

            const conditionDiv = document.createElement('div');
            conditionDiv.className = 'condition';

            const nameDiv = document.createElement('div');
            nameDiv.className = 'name';
            const nameSpan = document.createElement('span');
            nameSpan.className = 'sp1';
            nameSpan.textContent = achievement.name || 'Без названия';
            nameDiv.appendChild(nameSpan);
            conditionDiv.appendChild(nameDiv);

            const conditionsText = [];

            if (achievement.gamesNumberNeeded > 0) {
                conditionsText.push(`Сыграно игр: ${achievement.gamesNumberNeeded}`);
            }
            if (achievement.globalPointsNeeded > 0) {
                conditionsText.push(`Всего очков: ${achievement.globalPointsNeeded}`);
            }
            if (achievement.currentGamePointsNeeded > 0) {
                conditionsText.push(`Очков в игре: ${achievement.currentGamePointsNeeded}`);
            }
            if (achievement.currentGameRatingNeeded > 0) {
                conditionsText.push(`Место в игре: ${achievement.currentGameRatingNeeded}`);
            }
            if (achievement.currentGameLevelDifficultyNeeded > 0) {
                const difficultyMap = {1: 'Лёгкая', 2: 'Средняя', 3: 'Сложная'};
                const difficulty = difficultyMap[achievement.currentGameLevelDifficultyNeeded] || 'Любая';
                conditionsText.push(`Сложность: ${difficulty}`);
            }
            if (achievement.profilePicNeeded) {
                conditionsText.push('Установлен аватар');
            }
            if (achievement.descriptionNeeded) {
                conditionsText.push('Заполнено описание');
            }
            if (achievement.globalRatingPlaceNeeded > 0) {
                conditionsText.push(`Место в топе: ${achievement.globalRatingPlaceNeeded}`);
            }

            const textDiv = document.createElement('div');
            textDiv.className = 'text';
            textDiv.textContent = conditionsText.length > 0
                ? 'Требуется: ' + conditionsText.join(' • ')
                : 'Нет дополнительных условий';

            conditionDiv.appendChild(textDiv);
            achivElement.appendChild(conditionDiv);
            container.appendChild(achivElement);
        });
    }
</script>
</body>
</html>

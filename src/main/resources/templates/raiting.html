<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles/raiting_style.css">
    <title>QUIZAI - Рейтинг</title>
</head>

<body>
<div class="main_cont">
    <header>
        <a href="main.html" class="btn_back">НАЗАД</a>
        <h1 class="h11">QUIZ AI ARENA</h1>
    </header>

    <p class="h12">БЕСКОНЕЧНОСТЬ НЕ ПРЕДЕЛ!</p>

    <main>
        <div class="leaderboard-tabs" role="tablist" aria-label="Тип рейтинга">
            <button type="button" class="leaderboard-tab active" data-leaderboard="casual">Рейтинг КАЗУАЛА</button>
            <button type="button" class="leaderboard-tab" data-leaderboard="coins">Рейтинг БОГАЧЕЙ</button>
        </div>

        <div class="raiting">
            <div class="raiting-accent"></div>
            <div>
                <span>
                    ВАШЕ МЕСТО В РЕЙТИНГЕ:
                </span>
                <span id="user-rank">
                    Не в топе
                </span>
            </div>
        </div>

        <div class="players">
            <div class="players-header">ТОП ИГРОКОВ ПО РЕЙТИНГУ</div>
            <div class="player template">
                <div class="player-info">
                    <span class="player-rank">1</span>
                    <div class="player-avatar"></div>
                    <span class="player-name">Имя игрока</span>
                    <span class="player-points">1000 очков</span>
                </div>
            </div>
        </div>
    </main>
</div>

<div id="app-notification" class="app-notification hidden">
    <div class="app-notification__content">
        <div class="app-notification__icon">!</div>
        <div class="app-notification__text" id="app-notification-text">Сообщение</div>
        <button type="button" class="app-notification__close" id="app-notification-close">&times;</button>
    </div>
</div>
</body>

<script src="/js/auth.js"></script>
<script src="/js/checkCurrentGame.js"></script>
<script>
    let notificationTimeout;
    let currentLeaderboard = 'casual';
    let refreshTimer;

    document.addEventListener('DOMContentLoaded', function () {
      if (!AuthService.requireAuth()) return;
      checkCurrentGame();
      setupLeaderboardTabs();
      loadLeaderboard();

      const closeBtn = document.getElementById('app-notification-close');
      closeBtn.addEventListener('click', hideNotification);
    });

    function setupLeaderboardTabs() {
      document.querySelectorAll('.leaderboard-tab').forEach(tab => {
        tab.addEventListener('click', function () {
          currentLeaderboard = this.dataset.leaderboard;
          document.querySelectorAll('.leaderboard-tab').forEach(item => item.classList.remove('active'));
          this.classList.add('active');
          loadLeaderboard();
        });
      });
    }

    async function loadLeaderboard() {
      try {
        const userData = AuthService.getUser();
        let currentUsername = userData?.username;

        if (!currentUsername) {
          console.error('Имя пользователя не найдено в localStorage');
          const rawUser = localStorage.getItem('user');
          if (rawUser) {
            const parsedUser = JSON.parse(rawUser);
            if (parsedUser.username) {
              currentUsername = parsedUser.username;
            }
          }

          if (!currentUsername) {
            console.error('Имя пользователя не найдено');
            showError('Требуется авторизация');
            return;
          }
        }

        const endpoint = currentLeaderboard === 'coins'
          ? 'http://localhost:8080/api/leaderboard/get/coins'
          : 'http://localhost:8080/api/leaderboard/get/global';
        const response = await fetch(endpoint, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          mode: 'cors',
          credentials: 'include'
        });

        if (!response.ok) {
          const errorText = await response.text();
          console.error('Ошибка сервера:', response.status, errorText);
          throw new Error(`Ошибка HTTP: ${response.status}`);
        }

        const leaderboardData = await response.json();

        if (!Array.isArray(leaderboardData)) {
          console.error('Некорректный формат данных:', leaderboardData);
          throw new Error('Некорректный формат данных рейтинга');
        }

        const players = leaderboardData.map(item => {
          if (currentLeaderboard === 'coins') {
            return {
              id: item[0],
              username: item[1],
              value: item[2] || 0,
              premiumActive: Boolean(item[3]),
              picId: item[4] || 0,
              avatarUrl: item[5] || null
            };
          }
          return {
            id: item[0],
            username: item[1],
            value: item[2] || 0,
            possible: item[3] || 0,
            premiumActive: Boolean(item[4]),
            picId: item[5] || 0,
            avatarUrl: item[6] || null
          };
        });

        players.sort((a, b) => {
          if (b.value !== a.value) return b.value - a.value;
          return a.username.localeCompare(b.username);
        });

        displayLeaderboard(players, currentUsername);

      } catch (error) {
        console.error('Ошибка загрузки рейтинга:', error);
        showError('Не удалось загрузить рейтинг игроков: ' + error.message);
      }
    }

    function displayLeaderboard(players, currentUsername) {
      const playersContainer = document.querySelector('.players');
      const template = document.querySelector('.player.template');

      const existingPlayers = playersContainer.querySelectorAll('.player:not(.template)');
      existingPlayers.forEach(player => player.remove());

      const existingError = playersContainer.querySelector('.error-message');
      if (existingError) existingError.remove();

      const noPlayersMessage = playersContainer.querySelector('.no-players-message');
      if (noPlayersMessage) noPlayersMessage.remove();

      if (!players || players.length === 0) {
        const noPlayersMsg = document.createElement('div');
        noPlayersMsg.className = 'no-players-message';
        noPlayersMsg.textContent = currentLeaderboard === 'coins'
          ? 'Рейтинг богачей пока пуст.'
          : 'Рейтинг пока пуст. Будьте первым!';
        playersContainer.appendChild(noPlayersMsg);
        return;
      }

      const currentUserIndex = players.findIndex(p => p.username === currentUsername);
      const currentUser = currentUserIndex !== -1 ? players[currentUserIndex] : null;

      updateUserStats(currentUser, currentUserIndex + 1);
      document.querySelector('.players-header').textContent = currentLeaderboard === 'coins'
        ? 'ТОП 50 ПО КОИНАМ'
        : 'ТОП ИГРОКОВ ПО РЕЙТИНГУ';

      players.forEach((player, index) => {
        const playerElement = template.cloneNode(true);
        playerElement.classList.remove('template');
        playerElement.style.display = 'block';

        const rankElement = playerElement.querySelector('.player-rank');
        const avatarElement = playerElement.querySelector('.player-avatar');
        const nameElement = playerElement.querySelector('.player-name');
        const pointsElement = playerElement.querySelector('.player-points');

        const rank = index + 1;
        rankElement.textContent = rank;
        nameElement.textContent = player.username;
        if (player.premiumActive) {
          const premiumStar = document.createElement('span');
          premiumStar.className = 'premium-star';
          premiumStar.textContent = '★';
          nameElement.appendChild(premiumStar);
        }
        AuthService.displayAvatarElement(avatarElement, {
          picId: player.picId,
          avatarUrl: player.avatarUrl,
          username: player.username
        });
        pointsElement.textContent = currentLeaderboard === 'coins'
          ? `${player.value} коинов`
          : `${player.value} очков`;

        if (currentUsername && player.username === currentUsername) {
          playerElement.classList.add('current-user');
        }

        playerElement.setAttribute('data-player-id', player.id);
        playerElement.setAttribute('data-rank', rank);

        playersContainer.appendChild(playerElement);
      });

      template.style.display = 'none';
    }

    function updateUserStats(user, rank) {
      const userRankElement = document.getElementById('user-rank');

      if (user) {
        userRankElement.textContent = rank || 'Не в топе';
      } else {
        userRankElement.textContent = 'Не в топе';
      }
    }

    function showError(message) {
      const notification = document.getElementById('app-notification');
      const text = document.getElementById('app-notification-text');

      clearTimeout(notificationTimeout);
      text.textContent = message;
      notification.classList.remove('hidden');

      notificationTimeout = setTimeout(() => {
        hideNotification();
      }, 4000);
    }

    function hideNotification() {
      const notification = document.getElementById('app-notification');
      notification.classList.add('hidden');
    }

    function refreshLeaderboard() {
      const noPlayersMessage = document.querySelector('.no-players-message');
      if (noPlayersMessage) {
        noPlayersMessage.remove();
      }

      const playersContainer = document.querySelector('.players');
      if (playersContainer) {
        playersContainer.classList.add('loading');
      }

      loadLeaderboard().then(() => {
        if (playersContainer) {
          playersContainer.classList.remove('loading');
        }
      });
    }

    refreshTimer = setInterval(refreshLeaderboard, 10000);
</script>
</html>

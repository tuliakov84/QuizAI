<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles/connect2_style.css">
    <title>QUIZAI</title>
</head>

<body>
<div class="main_cont">
    <header>
        <a href="connect1.html" class="btn_back">НАЗАД</a>
        <h1 class="h11">QUIZ AI ARENA</h1>
    </header>

    <main>
        <div class="main_blockl">
            <div class="tablehead">
                <p class="h12">ID КОМНАТЫ</p>
                <p class="h12">УЧАСТНИКОВ</p>
            </div>
            <div id="rooms-container">
                <!-- Комнаты будут загружены динамически -->
            </div>
        </div>

        <div class="main_blockr">
            <span id="selected-room-id">ВЫБЕРИТЕ КОМНАТУ</span>
            <a href="#" id="join-btn" class="btnd" style="display: none;">ПРИСОЕДИНИТЬСЯ</a>
        </div>
    </main>
</div>

<div id="app-notification" class="app-notification hidden">
    <div class="app-notification__content">
        <div class="app-notification__icon">!</div>
        <div class="app-notification__text" id="app-notification-text">Сообщение</div>
        <button type="button" class="app-notification__close" id="app-notification-close">&times;</button>
    </div>
</div>

<script src="/js/auth.js"></script>
<script src="/js/checkCurrentGame.js"></script>
<script>
    let selectedGameId = null;
    let availableRooms = [];
    let currentSelectedMode = null;
    let refreshInterval;
    let notificationTimeout;

    document.addEventListener('DOMContentLoaded', function () {
      if (!AuthService.requireAuth()) return;
      checkCurrentGame();
      loadOpenRooms();
      initializeEventHandlers();

      refreshInterval = setInterval(loadOpenRooms, 10000);
    });

    window.addEventListener('beforeunload', function () {
      if (refreshInterval) {
        clearInterval(refreshInterval);
      }
    });

    function initializeEventHandlers() {
      const joinBtn = document.getElementById('join-btn');
      const notificationClose = document.getElementById('app-notification-close');

      joinBtn.addEventListener('click', handleJoinRoom);
      notificationClose.addEventListener('click', hideNotification);
    }

    async function loadOpenRooms() {
      try {
        let selectedMode = JSON.parse(localStorage.getItem('selectedMode'));
        if (!selectedMode) {
          showErrorMessage('Режим не выбран');
          return;
        }
        currentSelectedMode = selectedMode;
        if (selectedMode.mode !== 'DUEL') {
          const selectedTopic = JSON.parse(localStorage.getItem('selectedTopic'));
          if (!selectedTopic) {
          showErrorMessage('Тема не выбрана');
          return;
          }
          console.log('Загружаем комнаты для темы:', selectedTopic, selectedMode);
          availableRooms = await fetchOpenRooms(selectedTopic.topicId, selectedMode);
        } else {
          console.log('Загружаем комнаты для дуэли без выбора темы:', selectedMode);
          availableRooms = await fetchOpenRoomsAll(selectedMode);
        }
        displayRooms(availableRooms);

      } catch (error) {
        console.error('Ошибка загрузки комнат:', error);
        showErrorMessage('Ошибка загрузки комнат');
      }
    }

    async function fetchOpenRooms(topicId, selectedMode) {
      const session = AuthService.getsession();

      const response = await fetch('http://localhost:8080/api/game/get-open', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${session}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          topicId: topicId
        })
      });

      if (!response.ok) {
        throw new Error(`Ошибка HTTP: ${response.status}`);
      }

      const roomsData = await response.json();
      console.log('Получены комнаты:', roomsData);

      // Обрабатываем формат данных: [[gameId, currentParticipantsNumber, participantsNumber, gameMode], ...]
      const roomsWithDetails = roomsData.map(roomArray => {
        const [gameId, currentParticipants, maxParticipants, mode] = roomArray;
        return {
          gameId: gameId,
          currentParticipants: currentParticipants,
          maxParticipants: maxParticipants,
          mode: mode
        };
      });

      // Фильтруем только незаполненные комнаты
      return roomsWithDetails.filter(room => room.currentParticipants < room.maxParticipants && room.mode === selectedMode.mode);
    }

    async function fetchOpenRoomsAll(selectedMode) {
      const session = AuthService.getsession();

      const response = await fetch('http://localhost:8080/api/game/get-open-all', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${session}`,
          'Content-Type': 'application/json'
        }
      });

      if (!response.ok) {
        throw new Error(`Ошибка HTTP: ${response.status}`);
      }

      const roomsData = await response.json();
      const roomsWithDetails = roomsData.map(roomArray => {
        const [gameId, topicId, currentParticipants, maxParticipants, mode] = roomArray;
        return { gameId, topicId, currentParticipants, maxParticipants, mode };
      });

      return roomsWithDetails.filter(room => room.currentParticipants < room.maxParticipants && room.mode === selectedMode.mode);
    }

    function displayRooms(rooms) {
      const container = document.getElementById('rooms-container');
      const previouslySelected = selectedGameId;

      container.innerHTML = '';

      if (rooms.length === 0) {
        const emptyMessage = currentSelectedMode && currentSelectedMode.mode === 'DUEL'
          ? 'Нет открытых комнат для дуэли'
          : 'Нет открытых комнат для выбранной темы';
        container.innerHTML = `<div class="no-rooms">${emptyMessage}</div>`;
        document.getElementById('selected-room-id').textContent = 'ВЫБЕРИТЕ КОМНАТУ';
        document.getElementById('join-btn').style.display = 'none';
        selectedGameId = null;
        return;
      }

      rooms.forEach(room => {
        const roomElement = document.createElement('a');
        roomElement.href = '#';
        roomElement.className = 'btn room-item';
        if (room.gameId === previouslySelected) {
          roomElement.classList.add('selected');
        }
        roomElement.innerHTML = `
          <div class="text">
            <p>${room.gameId}</p>
            <p>${room.currentParticipants}/${room.maxParticipants} · ${room.mode}</p>
          </div>
        `;

        roomElement.addEventListener('click', (e) => {
          e.preventDefault();
          selectRoom(room, e.currentTarget);
        });

        container.appendChild(roomElement);
      });

      if (previouslySelected && rooms.some(room => room.gameId === previouslySelected)) {
        const roomElements = container.querySelectorAll('.room-item');
        roomElements.forEach(element => {
          if (element.querySelector('p').textContent === previouslySelected.toString()) {
            element.classList.add('selected');
          }
        });
      } else {
        selectedGameId = null;
        document.getElementById('selected-room-id').textContent = 'ВЫБЕРИТЕ КОМНАТУ';
        document.getElementById('join-btn').style.display = 'none';
      }
    }

    function selectRoom(room, clickedElement) {
      selectedGameId = room.gameId;

      document.getElementById('selected-room-id').textContent = `ID: ${room.gameId}`;
      document.getElementById('join-btn').style.display = 'block';

      document.querySelectorAll('.room-item').forEach(item => {
        item.classList.remove('selected');
      });

      clickedElement.classList.add('selected');
    }

    async function handleJoinRoom() {
      if (!selectedGameId) {
        showErrorMessage('Выберите комнату для присоединения');
        return;
      }

      const joinBtn = document.getElementById('join-btn');
      joinBtn.textContent = 'ПОДКЛЮЧЕНИЕ...';
      joinBtn.style.pointerEvents = 'none';

      try {
        const result = await joinRoomById(selectedGameId);

        if (result.success) {
          localStorage.setItem('currentGameId', selectedGameId.toString());

          if (result.game && result.game.topicId) {
            localStorage.setItem('currentTopicId', result.game.topicId.toString());
          }

          if (refreshInterval) {
            clearInterval(refreshInterval);
          }

          window.location.href = `roommember.html?gameId=${selectedGameId}`;
        } else {
          showErrorMessage(result.message || 'Не удалось подключиться к комнате');
          loadOpenRooms();
        }
      } catch (error) {
        console.error('Ошибка подключения к комнате:', error);
        showErrorMessage('Ошибка подключения к серверу');
      } finally {
        joinBtn.textContent = 'ПРИСОЕДИНИТЬСЯ';
        joinBtn.style.pointerEvents = 'auto';
      }
    }

    async function joinRoomById(gameId) {
      const session = AuthService.getsession();

      try {
        const response = await fetch(`http://localhost:8080/api/game/join`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${session}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            gameId: parseInt(gameId),
            session: session
          })
        });

        if (response.ok) {
          const gameData = await response.json();
          sessionStorage.setItem('gameInfo', JSON.stringify({
            totalQuestions: gameData.numberOfQuestions,
            levelDifficulty: gameData.levelDifficulty,
            mode: gameData.mode || 'CASUAL'
          }));
          return {
            success: true,
            game: gameData
          };
        } else if (response.status === 404) {
          return {
            success: false,
            message: 'Квиз с таким ID не найден или количество участников максимально'
          };
        } else if (response.status === 409) {
          return {
            success: false,
            message: 'Квиз уже начат или завершен'
          };
        } else {
          const errorText = await response.text();
          return {
            success: false,
            message: 'Ошибка подключения к квизу: ' + (errorText || response.status)
          };
        }
      } catch (error) {
        console.error('Ошибка при подключении к квизу:', error);
        throw error;
      }
    }

    function showLoadingMessage(text) {
      const container = document.getElementById('rooms-container');
      container.innerHTML = `<div class="loading-message">${text}</div>`;
    }

    function showErrorMessage(message) {
      showNotification(message, 'error');
    }

    function showNotification(message, type = 'error') {
      const notification = document.getElementById('app-notification');
      const text = document.getElementById('app-notification-text');

      clearTimeout(notificationTimeout);

      notification.classList.remove('hidden', 'success', 'error');
      notification.classList.add(type);
      text.textContent = message;

      notificationTimeout = setTimeout(() => {
        hideNotification();
      }, 3000);
    }

    function hideNotification() {
      const notification = document.getElementById('app-notification');
      notification.classList.add('hidden');
    }
</script>
</body>

</html>

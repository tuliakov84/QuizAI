<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles/roomadmin_style.css">
    <title>QUIZAI</title>
</head>

<body>
<div class="main_cont">

    <main>
        <div class="left">
            <header>
                <a href="main.html" class="btn_back">НАЗАД</a>
                <h1 class="h11">QUIZ AI ARENA</h1>
            </header>

            <div class="players">
                <div class="players-header">
                    <span class="players-title">УЧАСТНИКИ:</span>
                    <span id="players-count" class="players-count">0/0</span>
                </div>
                <div id="players-container" class="players-list">
                    <!-- Игроки будут загружены через JavaScript -->
                </div>
            </div>
        </div>

        <div class="main_blockr">
            <div class="room-info-section">
                <div class="room-info-label">CCЫЛКА-ПРИГЛАШЕНИЕ:</div>
                <div class="room-info-value">
                    <span id="invite-link">Загрузка...</span>
                    <span class="copy-icon" title="Копировать">📋</span>
                </div>

                <div class="room-info-label">ID-КВИЗА:</div>
                <div class="room-info-value" id="invite-id">Загрузка...</div>
            </div>

            <div class="questions-status-section">
                <div class="questions-status-label">СТАТУС ВОПРОСОВ:</div>
                <div id="questions-status" class="questions-status-value loading">
                    <span class="status-icon">⏳</span>
                    <span class="status-text">Загрузка вопросов</span>
                    <span class="loading-dots"></span>
                </div>
            </div>

            <div class="room-info-section">
                <span>ИЗМЕНИТЬ ПРИВАТНОСТЬ КОМНАТЫ:</span>
                <div class="isprivate block_hor">
                    <a href="#" class="btnprivate privacy-btn" data-private="false">ОТКРЫТАЯ</a>
                    <a href="#" class="btnprivate privacy-btn" data-private="true">ЗАКРЫТАЯ</a>
                </div>

                <span>ТЕМА КВИЗА:</span>
                <div class="theme">
                    <div id="quiz-theme" class="h11">Загрузка...</div>
                </div>
            </div>

            <a href="#" class="btnstart disabled" id="start-quiz-btn">НАЧАТЬ КВИЗ ДОСРОЧНО</a>
            <div id="start-quiz-message" class="message" style="display: none;"></div>
        </div>
    </main>
</div>

<script src="/js/auth.js"></script>
<script>
    let gameId = null;
    let refreshInterval = null;
    let maxPlayers = 10; // Максимальное количество игроков
    let isPrivate = false; // Текущая приватность комнаты
    let currentPlayers = []; // Текущий список игроков
    let isQuizStarting = false; // Флаг, что квиз начинается
    let questionsReady = false; // Флаг готовности вопросов
    let isCheckingQuestions = false; // Флаг проверки вопросов (чтобы избежать множественных проверок)
    let isInternalNavigation = false;

    document.addEventListener('DOMContentLoaded', function () {
      if (!AuthService.requireAuth()) return;

      // Загружаем тему из localStorage и отображаем её
      loadThemeFromLocalStorage();

      // Получаем gameId из URL параметров
      const urlParams = new URLSearchParams(window.location.search);
      gameId = urlParams.get('gameId');

      if (!gameId) {
        console.error('Game ID не найден в URL');
        return;
      }

      initializeRoom();
      setupEventListeners();
    });

    // Загрузка темы из localStorage
    function loadThemeFromLocalStorage() {
      try {
        const themeElement = document.getElementById('quiz-theme');
        const selectedTopicData = localStorage.getItem('selectedTopic');

        if (selectedTopicData) {
          const selectedTopic = JSON.parse(selectedTopicData);
          themeElement.textContent = selectedTopic.name;
        } else {
          themeElement.textContent = 'Тема не выбрана';
          console.warn('Тема не найдена в localStorage');
        }
      } catch (error) {
        console.error('Ошибка загрузки темы из localStorage:', error);
        document.getElementById('quiz-theme').textContent = 'Ошибка загрузки темы';
      }
    }

    function initializeRoom() {
      // Загружаем данные комнаты
      loadRoomData();

      // Начинаем периодическое обновление каждые 3 секунды
      refreshInterval = setInterval(updateLobby, 3000);

      // Сразу загружаем данные при инициализации
      updateLobby();
    }

    async function updateLobby() {
      try {
        // Обновляем данные лобби
        await loadPlayers();

        // Проверяем готовность вопросов (раз в 5 секунд)
        if (!questionsReady) {
          await checkQuestionsReady();
        }

        // После загрузки проверяем возможность начала квиза
        updateStartButtonState();
      } catch (error) {
        console.error('Ошибка обновления лобби:', error);
      }
    }

    function setupEventListeners() {
      // Обработчики для кнопок приватности
      document.querySelectorAll('.privacy-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
          e.preventDefault();
          changeRoomPrivacy(this.dataset.private === 'true');
        });
      });

      // Обработчик для кнопки начала квиза
      document.getElementById('start-quiz-btn').addEventListener('click', function (e) {
        e.preventDefault();
        if (!this.classList.contains('disabled') && !isQuizStarting) {
          startQuiz();
        }
      });
    }

    // Проверка готовности вопросов
    async function checkQuestionsReady() {
      if (isCheckingQuestions) return; // Избегаем множественных одновременных запросов

      try {
        isCheckingQuestions = true;
        const session = AuthService.getsession();

        // Используем тот же endpoint, что и для получения списка игроков
        const response = await fetch('http://localhost:8080/api/game/get/lobby', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + session,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            gameId: parseInt(gameId)
          })
        });

        if (!response.ok) {
          throw new Error(`Ошибка HTTP: ${response.status}`);
        }

        const lobbyData = await response.json();

        // Проверяем наличие поля questionsReady в ответе
        if (lobbyData.questionsReady !== undefined) {
          questionsReady = lobbyData.questionsReady;
        } else {
          console.warn('Поле questionsReady отсутствует в ответе сервера');
          // Если поле отсутствует, проверяем по другому признаку - например, готовность игры
          questionsReady = lobbyData.ready || false;
        }

        // Обновляем отображение статуса вопросов
        updateQuestionsStatus();

        return questionsReady;
      } catch (error) {
        console.error('Ошибка проверки готовности вопросов:', error);
        questionsReady = false;
        updateQuestionsStatus();
        return false;
      } finally {
        isCheckingQuestions = false;
      }
    }

    // Обновление отображения статуса вопросов
    function updateQuestionsStatus() {
      const statusElement = document.getElementById('questions-status');
      const statusText = statusElement.querySelector('.status-text');
      const statusIcon = statusElement.querySelector('.status-icon');

      if (questionsReady) {
        statusElement.className = 'questions-status-value ready';
        statusIcon.textContent = '✅';
        statusText.textContent = 'Вопросы готовы';
        statusElement.title = 'Все вопросы загружены и проверены';
      } else {
        statusElement.className = 'questions-status-value loading';
        statusIcon.textContent = '⏳';
        statusText.textContent = 'Персонализация при старте';
        statusElement.title = 'Вопросы будут сгенерированы и персонализированы при запуске квиза';
      }
    }

    // Обновление состояния кнопки начала квиза
    function updateStartButtonState() {
      const startBtn = document.getElementById('start-quiz-btn');
      const messageElement = document.getElementById('start-quiz-message');

      let isReady = false;
      let message = '';
      let messageType = '';

      if (currentPlayers.length < 2) {
        message = 'Для начала квиза нужно минимум 2 игрока';
        messageType = 'warning';
        isReady = false;
      } else {
        isReady = true;
      }

      if (isReady) {
        enableStartButton();
        if (messageElement) {
          messageElement.style.display = 'none';
        }

        // Автоматический старт при заполнении комнаты (только если вопросы готовы)
        if (currentPlayers.length >= maxPlayers && !isQuizStarting) {
          console.log('Комната заполнена и вопросы готовы - начинаем квиз автоматически...');
          // Небольшая задержка для лучшего UX
          setTimeout(() => startQuiz(), 1000);
        }
      } else {
        disableStartButton(message);
        if (messageElement && message) {
          messageElement.textContent = message;
          messageElement.className = `message ${messageType}`;
          messageElement.style.display = 'block';
        }
      }
    }

    // Изменение приватности комнаты
    async function changeRoomPrivacy(newPrivacy) {
      try {
        const session = AuthService.getsession();

        const response = await fetch('http://localhost:8080/api/game/set/private', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + session,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            gameId: parseInt(gameId),
            isPrivate: newPrivacy
          })
        });

        if (!response.ok) {
          throw new Error(`Ошибка HTTP: ${response.status}`);
        }

        // Обновляем UI
        updatePrivacyButtons(newPrivacy);
        isPrivate = newPrivacy;

        alert(`Комната теперь ${newPrivacy ? 'ЗАКРЫТАЯ' : 'ОТКРЫТАЯ'}`);

      } catch (error) {
        console.error('Ошибка изменения приватности комнаты:', error);
        alert('Ошибка изменения приватности: ' + error.message);
      }
    }

    // Обновление кнопок приватности
    function updatePrivacyButtons(privacy) {
      // Снимаем выделение со всех кнопок приватности
      document.querySelectorAll('.privacy-btn').forEach(b => {
        b.classList.remove('active');
      });

      // Выделяем выбранную кнопку
      const activeButton = document.querySelector(`.privacy-btn[data-private="${privacy}"]`);
      if (activeButton) {
        activeButton.classList.add('active');
      }
    }

    // Загрузка данных комнаты
    async function loadRoomData() {
      try {
        const session = AuthService.getsession();

        const response = await fetch('http://localhost:8080/api/game/join', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + session,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            session: session,
            gameId: parseInt(gameId)
          })
        });

        if (!response.ok) {
          throw new Error(`Ошибка HTTP: ${response.status}`);
        }

        const roomData = await response.json();

        // Обновляем информацию о комнате
        updateRoomInfo(roomData);

      } catch (error) {
        console.error('Ошибка загрузки данных комнаты:', error);
      }
    }

    // Загрузка списка игроков
    async function loadPlayers() {
      try {
        const session = AuthService.getsession();

        const response = await fetch('http://localhost:8080/api/game/get/lobby', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + session,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            gameId: parseInt(gameId)
          })
        });

        if (!response.ok) {
          throw new Error(`Ошибка HTTP: ${response.status}`);
        }

        const lobbyData = await response.json();

        console.log('Данные лобби:', lobbyData);

        if (!lobbyData.playersUsernames) {
          console.warn('Поле playersUsernames отсутствует в ответе');
          currentPlayers = [];
        } else {
          // Преобразуем массив имен игроков в массив объектов
          currentPlayers = lobbyData.playersUsernames.map((username, index) => ({
            username: username,
            userId: index + 1
          }));
        }

        displayPlayers(currentPlayers);

        // Получаем готовность вопросов из того же ответа (если есть)
        if (lobbyData.questionsReady !== undefined) {
          questionsReady = lobbyData.questionsReady;
          updateQuestionsStatus();
        }

        // Получаем статус ready из ответа (если есть)
        if (lobbyData.ready !== undefined && !questionsReady) {
          // Если нет отдельного флага questionsReady, используем общий ready
          questionsReady = lobbyData.ready;
          updateQuestionsStatus();
        }

        return currentPlayers;

      } catch (error) {
        console.error('Ошибка загрузки списка игроков:', error);
        currentPlayers = [];
        displayPlayers([]);
        return [];
      }
    }

    // Отображение списка игроков
    function displayPlayers(players) {
      const container = document.getElementById('players-container');
      const countElement = document.getElementById('players-count');

      container.innerHTML = '';

      if (players.length === 0) {
        container.innerHTML = '<div class="no-players">Нет участников</div>';
        countElement.textContent = '0/' + maxPlayers;
        return;
      }

      players.forEach(player => {
        const playerElement = document.createElement('div');
        playerElement.className = 'player';
        playerElement.textContent = player.username;
        container.appendChild(playerElement);
      });

      // Обновляем счетчик игроков
      countElement.textContent = `${players.length}/${maxPlayers}`;
    }

    // Включение кнопки начала квиза
    function enableStartButton() {
      const startBtn = document.getElementById('start-quiz-btn');
      startBtn.classList.remove('disabled');
      startBtn.style.pointerEvents = 'auto';
      startBtn.style.opacity = '1';
      startBtn.textContent = 'НАЧАТЬ КВИЗ ДОСРОЧНО';
    }

    // Отключение кнопки начала квиза
    function disableStartButton(reason = '') {
      const startBtn = document.getElementById('start-quiz-btn');
      startBtn.classList.add('disabled');
      startBtn.style.pointerEvents = 'none';
      startBtn.style.opacity = '0.5';

      if (reason) {
        startBtn.title = reason;
        console.log('Кнопка заблокирована:', reason);
      }
    }

    // Обновление информации о комнате
    function updateRoomInfo(roomData) {
        // Обновляем ссылку-приглашение
        const linkElement = document.getElementById('invite-link');
        const fullLink = `${window.location.origin}/room.html?gameId=${gameId}`;
        linkElement.textContent = fullLink;

        const IDElement = document.getElementById('invite-id');
        IDElement.textContent = `${gameId}`;

        // Копирование ссылки по клику
        document.querySelector('.copy-icon').addEventListener('click', function () {
            navigator.clipboard.writeText(fullLink)
                .then(() => {
                    const originalText = this.textContent;
                    this.textContent = '✅';
                    setTimeout(() => {
                        this.textContent = originalText;
                    }, 2000);
                })
                .catch(err => console.error('Ошибка копирования:', err));
        });

        // Устанавливаем начальную приватность из данных комнаты
        if (roomData.isPrivate !== undefined) {
            isPrivate = roomData.isPrivate;
            updatePrivacyButtons(isPrivate);
        }

        // Получаем максимальное количество игроков из данных комнаты (если есть)
        if (roomData.participantsNumber) {
            maxPlayers = roomData.participantsNumber;
            // Сразу обновляем счетчик
            document.getElementById('players-count').textContent = `0/${maxPlayers}`;
        }
    }

    // Обработчик для кнопки "Назад"
    document.querySelector('.btn_back').addEventListener('click', function (e) {
      e.preventDefault();
      confirmExit();
    });

    // Функция подтверждения выхода
    function confirmExit() {
      const confirmed = confirm('При выходе комната будет удалена. Вы уверены, что хотите выйти?');

      if (confirmed) {
        stopGameAndExit();
      }
    }

    // Функция остановки игры и выхода
    async function stopGameAndExit() {
      isInternalNavigation = true;
      try {
        const session = AuthService.getsession();

        const response = await fetch('http://localhost:8080/api/game/delete', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + session,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            gameId: parseInt(gameId)
          })
        });

        if (!response.ok) {
          throw new Error(`Ошибка HTTP: ${response.status}`);
        }

        // Останавливаем обновление списка игроков
        if (refreshInterval) {
          clearInterval(refreshInterval);
        }

        localStorage.removeItem('currentGameId');
        localStorage.removeItem('selectedTopic');
        // Перенаправляем на главную страницу
        window.location.href = 'main.html';

      } catch (error) {
        console.error('Ошибка остановки игры:', error);
        alert('Ошибка при выходе из комнаты: ' + error.message);
      }
    }

    // Также обрабатываем закрытие вкладки/браузера
    window.addEventListener('beforeunload', function (e) {
      // Только если пользователь действительно уходит со страницы
      if (!isNavigatingToQuiz) {
        // Для современных браузеров мы не можем выполнить асинхронный запрос здесь,
        // но можем показать предупреждение
        e.preventDefault();
        e.returnValue = 'При выходе комната будет удалена. Вы уверены, что хотите выйти?';
        return e.returnValue;
      }
    });

    // Флаг для отслеживания навигации внутри приложения
    let isNavigatingToQuiz = false;

    async function startQuiz() {
      isInternalNavigation = true;
      // Проверяем все условия перед началом
      if (currentPlayers.length < 2) {
        alert('Для начала квиза нужно минимум 2 игрока');
        return;
      }

      if (!questionsReady) {
        alert('Вопросы еще не готовы. Пожалуйста, подождите...');
        return;
      }

      if (isQuizStarting) {
        console.log('Квиз уже начинается...');
        return;
      }

      try {
        isQuizStarting = true;
        isNavigatingToQuiz = true;
        disableStartButton('Квиз начинается...');

        const session = AuthService.getsession();

        const response = await fetch('http://localhost:8080/api/game/start', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + session,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            gameId: parseInt(gameId)
          })
        });

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(`Ошибка HTTP: ${response.status}: ${errorText}`);
        }

        // Останавливаем обновление перед переходом
        if (refreshInterval) {
          clearInterval(refreshInterval);
        }

        // Перенаправляем на страницу с вопросами
        window.location.href = `question.html?gameId=${gameId}`;

      } catch (error) {
        isQuizStarting = false;
        isNavigatingToQuiz = false;
        console.error('Ошибка начала квиза:', error);
        alert('Ошибка начала квиза: ' + error.message);

        // Включаем кнопку обратно в случае ошибки
        updateStartButtonState();
      }
    }

    // Очистка при размонтировании компонента
    window.addEventListener('beforeunload', function (e) {
    // Если это не внутренний переход (например, кнопка "Назад" или старт квиза) и есть gameId
    if (!isInternalNavigation && gameId) {
        const session = AuthService.getsession();
        const url = 'http://localhost:8080/api/game/delete';
        const data = JSON.stringify({ gameId: parseInt(gameId) });

        // Отправляем запрос без ожидания ответа
        if (navigator.sendBeacon) {
            const blob = new Blob([data], { type: 'application/json' });
            navigator.sendBeacon(url, blob);
        } else {
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: data,
                keepalive: true
            }).catch(err => console.error('Ошибка отправки запроса при закрытии:', err));
        }

        // Показываем предупреждение
        e.preventDefault();
        e.returnValue = 'Вы уверены, что хотите покинуть страницу? Комната будет удалена.';
        return e.returnValue;
    }

    // Останавливаем обновление списка игроков при любом уходе со страницы
    if (refreshInterval) {
        clearInterval(refreshInterval);
    }
});
</script>
</body>

</html>

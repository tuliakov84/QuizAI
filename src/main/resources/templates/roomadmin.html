<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="/styles/roomadmin_style.css">
    <title>QUIZAI</title>
</head>

<body>
<div class="main_cont">

    <main>
        <div class="left">
            <header>
                <a href="#" id="back-button" class="btn_back">НАЗАД</a>
                <h1 class="h11">QUIZ AI ARENA</h1>
            </header>

            <div class="players">
                <div class="players-header">
                    <span class="players-title">УЧАСТНИКИ:</span>
                    <span id="players-count" class="players-count">0/0</span>
                </div>
                <div id="players-container" class="players-list">
                    <!-- Игроки будут загружены через JavaScript -->
                </div>
            </div>
        </div>

        <div class="main_blockr">
            <div class="panel-badge">ROOM CONTROL</div>

            <div class="room-info-section">
                <div class="room-info-label">ССЫЛКА-ПРИГЛАШЕНИЕ:</div>
                <div class="room-info-value invite-row">
                    <span id="invite-link">Загрузка...</span>
                    <span class="copy-icon" title="Копировать">📋</span>
                </div>

                <div class="room-info-label">ID-КВИЗА:</div>
                <div class="room-info-value" id="invite-id">Загрузка...</div>
            </div>

            <div class="questions-status-section">
                <div class="questions-status-label">СТАТУС ВОПРОСОВ:</div>
                <div id="questions-status" class="questions-status-value loading">
                    <span class="status-icon">⏳</span>
                    <span class="status-text">Загрузка вопросов</span>
                    <span class="loading-dots"></span>
                </div>
            </div>

            <div class="room-info-section">
                <span class="section-title">ИЗМЕНИТЬ ПРИВАТНОСТЬ КОМНАТЫ:</span>
                <div class="isprivate block_hor">
                    <a href="#" class="btnprivate privacy-btn" data-private="false">ОТКРЫТАЯ</a>
                    <a href="#" class="btnprivate privacy-btn" data-private="true">ЗАКРЫТАЯ</a>
                </div>

                <span class="section-title">ТЕМА КВИЗА:</span>
                <div class="theme">
                    <div id="quiz-theme" class="h11 theme-title">Загрузка...</div>
                </div>
            </div>

            <a href="#" class="btnstart disabled" id="start-quiz-btn">НАЧАТЬ КВИЗ ДОСРОЧНО</a>
            <div id="start-quiz-message" class="message" style="display: none;"></div>
        </div>
    </main>
</div>

<script src="/js/auth.js"></script>
<script>
    let gameId = null;
    let refreshInterval = null;
    let maxPlayers = 0;
    let isPrivate = false;
    let currentPlayers = [];
    let isQuizStarting = false;
    let questionsReady = false;
    let isCheckingQuestions = false;
    let isInternalNavigation = false;
    let currentGameMode = 'CASUAL';

    async function getCurrentGameFromServer() {
        const session = AuthService.getsession();
        if (!session) return { gameId: null, gameStartTime: null };

        try {
            const response = await fetch('http://localhost:8080/api/users/get-current-game', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + session,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ session: session })
            });
            if (!response.ok) return { gameId: null, gameStartTime: null };
            return await response.json();
        } catch (error) {
            console.error('Ошибка получения текущей игры:', error);
            return { gameId: null, gameStartTime: null };
        }
    }

    async function checkAndRedirectIfGameStarted() {
        const currentGame = await getCurrentGameFromServer();
        if (currentGame.gameId && currentGame.gameStartTime) {
            const startTime = new Date(currentGame.gameStartTime).getTime();
            const timePerQuestion = 30000;
            const diff = Date.now() - startTime;
            const questionNumber = Math.floor(diff / timePerQuestion) + 1;
            window.location.replace(`question.html?gameId=${currentGame.gameId}&question=${questionNumber}`);
            return true;
        }
        return false;
    }

    window.addEventListener('pageshow', function (event) {
        if (event.persisted) {
            console.log('Страница восстановлена из bfcache, перезагрузка...');
            window.location.reload();
        }
    });

    document.addEventListener('DOMContentLoaded', async function () {
        if (!AuthService.requireAuth()) return;

        const redirected = await checkAndRedirectIfGameStarted();
        if (redirected) return;

        const currentGame = await getCurrentGameFromServer();

        if (currentGame.gameId && !currentGame.gameStartTime) {
            gameId = currentGame.gameId;
        } else {
            const urlParams = new URLSearchParams(window.location.search);
            const urlGameId = urlParams.get('gameId');
            if (urlGameId) {
                gameId = parseInt(urlGameId);
            } else {
                window.location.replace('main.html');
                return;
            }
        }

        await initializeRoom();
        setupEventListeners();
    });

    async function initializeRoom() {
        const roomData = await loadRoomData();
        if (!roomData) {
            alert('Не удалось загрузить данные комнаты. Возможно, вы не являетесь создателем.');
            window.location.replace('main.html');
            return;
        }

        loadTheme();
        refreshInterval = setInterval(() => updateLobby(), 3000);
        await updateLobby();
    }

    async function loadRoomData() {
        const session = AuthService.getsession();
        try {
            const response = await fetch('http://localhost:8080/api/game/join', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + session,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    session: session,
                    gameId: gameId
                })
            });
            if (!response.ok) return null;
            const roomData = await response.json();

            const currentUser = AuthService.getUser();
            if (roomData.authorId && currentUser && roomData.authorId !== currentUser.userId) {
                console.warn('Пользователь не является создателем комнаты');
                return null;
            }

            updateRoomInfo(roomData);
            return roomData;
        } catch (error) {
            console.error('Ошибка загрузки данных комнаты:', error);
            return null;
        }
    }

    function loadTheme() {
        try {
            const themeElement = document.getElementById('quiz-theme');
            const selectedTopicData = localStorage.getItem('selectedTopic');
            if (selectedTopicData) {
                const selectedTopic = JSON.parse(selectedTopicData);
                themeElement.textContent = selectedTopic.name;
            } else {
                themeElement.textContent = 'Тема не выбрана';
            }
        } catch (error) {
            console.error('Ошибка загрузки темы:', error);
            document.getElementById('quiz-theme').textContent = 'Ошибка загрузки темы';
        }
    }

    function isStandardQuizMode() {
        return currentGameMode === 'CASUAL';
    }

    async function updateLobby() {
        try {
            await loadPlayers();
            if (!questionsReady) await checkQuestionsReady();
            updateStartButtonState();
        } catch (error) {
            console.error('Ошибка обновления лобби:', error);
        }
    }

    async function loadPlayers() {
        const session = AuthService.getsession();
        try {
            const response = await fetch('http://localhost:8080/api/game/get/lobby', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + session,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ gameId: gameId })
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const lobbyData = await response.json();

            if (lobbyData.gameMode) {
                currentGameMode = lobbyData.gameMode;
            }
            if (typeof lobbyData.participantsNumber === 'number') {
                maxPlayers = lobbyData.participantsNumber;
            }
            if (Array.isArray(lobbyData.players)) {
                currentPlayers = lobbyData.players;
            } else if (lobbyData.playersUsernames) {
                currentPlayers = lobbyData.playersUsernames.map((username, idx) => ({ username, userId: idx + 1 }));
            } else {
                currentPlayers = [];
            }
            displayPlayers(currentPlayers);

            if (lobbyData.questionsReady !== undefined) questionsReady = lobbyData.questionsReady;
            else if (lobbyData.ready !== undefined) questionsReady = lobbyData.ready;

            return currentPlayers;
        } catch (error) {
            console.error('Ошибка загрузки игроков:', error);
            currentPlayers = [];
            displayPlayers([]);
            return [];
        }
    }

    async function checkQuestionsReady() {
        if (isCheckingQuestions) return;
        isCheckingQuestions = true;
        try {
            const session = AuthService.getsession();
            const response = await fetch('http://localhost:8080/api/game/get/lobby', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + session,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ gameId: gameId })
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const lobbyData = await response.json();

            if (lobbyData.gameMode) {
                currentGameMode = lobbyData.gameMode;
            }
            questionsReady = lobbyData.questionsReady ?? lobbyData.ready ?? false;
            updateQuestionsStatus();
        } catch (error) {
            console.error('Ошибка проверки готовности вопросов:', error);
            questionsReady = false;
            updateQuestionsStatus();
        } finally {
            isCheckingQuestions = false;
        }
    }

    function updateQuestionsStatus() {
        const statusElement = document.getElementById('questions-status');
        const statusText = statusElement.querySelector('.status-text');
        const statusIcon = statusElement.querySelector('.status-icon');
        if (!isStandardQuizMode()) {
            statusElement.className = 'questions-status-value loading';
            statusIcon.textContent = '🧩';
            statusText.textContent = `Режим ${currentGameMode}: отдельный flow позже`;
            return;
        }
        if (questionsReady) {
            statusElement.className = 'questions-status-value ready';
            statusIcon.textContent = '✅';
            statusText.textContent = 'Вопросы готовы';
        } else {
            statusElement.className = 'questions-status-value loading';
            statusIcon.textContent = '⏳';
            statusText.textContent = 'Персонализация при старте';
        }
    }

    function displayPlayers(players) {
        const container = document.getElementById('players-container');
        const countElement = document.getElementById('players-count');
        const resolvedMaxPlayers = maxPlayers > 0 ? maxPlayers : players.length;
        container.innerHTML = '';
        if (players.length === 0) {
            container.innerHTML = '<div class="no-players">Нет участников</div>';
        } else {
            players.forEach(player => {
                const div = document.createElement('div');
                div.className = 'player';
                div.appendChild(createPlayerAvatar(player));
                const name = document.createElement('span');
                name.textContent = player.username;
                div.appendChild(name);
                container.appendChild(div);
            });
        }
        countElement.textContent = `${players.length}/${resolvedMaxPlayers}`;
    }

    function createPlayerAvatar(player) {
        const avatar = document.createElement('span');
        avatar.className = 'player-avatar';
        avatar.textContent = (player.username || '?').charAt(0).toUpperCase();
        avatar.style.cssText = `
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            margin-right: 12px;
            border-radius: 50%;
            flex: 0 0 38px;
            background: linear-gradient(135deg, #8279CF, #4c4779);
            color: #fff;
            font-weight: 800;
            background-size: cover;
            background-position: center;
        `;
        if (player.avatarUrl) {
            avatar.textContent = '';
            avatar.style.backgroundImage = `url('${player.avatarUrl}')`;
        }
        return avatar;
    }

    function updateStartButtonState() {
        const startBtn = document.getElementById('start-quiz-btn');
        const messageElement = document.getElementById('start-quiz-message');
        if (!isStandardQuizMode()) {
            const message = `Режим ${currentGameMode} сохранен, но отдельный игровой flow еще не подключен.`;
            disableStartButton(message);
            if (messageElement) {
                messageElement.textContent = message;
                messageElement.style.display = 'block';
                messageElement.className = 'message info';
            }
            return;
        }
        if (currentPlayers.length < 2) {
            disableStartButton('Для начала квиза нужно минимум 2 игрока');
            if (messageElement) {
                messageElement.textContent = 'Для начала квиза нужно минимум 2 игрока';
                messageElement.style.display = 'block';
                messageElement.className = 'message warning';
            }
            return;
        }
        if (!questionsReady) {
            disableStartButton('Вопросы еще не готовы. Пожалуйста, подождите...');
            if (messageElement) {
                messageElement.textContent = 'Вопросы еще не готовы. Пожалуйста, подождите...';
                messageElement.style.display = 'block';
                messageElement.className = 'message info';
            }
            return;
        }
        enableStartButton();
        if (messageElement) messageElement.style.display = 'none';

        if (maxPlayers > 0 && currentPlayers.length >= maxPlayers && questionsReady && !isQuizStarting) {
            setTimeout(() => startQuiz(), 1000);
        }
    }

    function enableStartButton() {
        const btn = document.getElementById('start-quiz-btn');
        btn.classList.remove('disabled');
        btn.style.pointerEvents = 'auto';
        btn.style.opacity = '1';
        btn.textContent = 'НАЧАТЬ КВИЗ ДОСРОЧНО';
    }

    function disableStartButton(reason) {
        const btn = document.getElementById('start-quiz-btn');
        btn.classList.add('disabled');
        btn.style.pointerEvents = 'none';
        btn.style.opacity = '0.5';
        btn.title = reason;
    }

    function updateRoomInfo(roomData) {
        const linkElement = document.getElementById('invite-link');
        const fullLink = `${window.location.origin}/room.html?gameId=${gameId}`;
        linkElement.textContent = fullLink;
        document.getElementById('invite-id').textContent = `${gameId}`;

        document.querySelector('.copy-icon').addEventListener('click', function () {
            navigator.clipboard.writeText(fullLink)
                .then(() => {
                    const original = this.textContent;
                    this.textContent = '✅';
                    setTimeout(() => { this.textContent = original; }, 2000);
                })
                .catch(err => console.error('Ошибка копирования:', err));
        });

        if (roomData.isPrivate !== undefined) {
            isPrivate = roomData.isPrivate;
            updatePrivacyButtons(isPrivate);
        }
        if (roomData.gameMode) {
            currentGameMode = roomData.gameMode;
        }
        if (typeof roomData.participantsNumber === 'number') {
            maxPlayers = roomData.participantsNumber;
            document.getElementById('players-count').textContent = `0/${maxPlayers}`;
        }
    }

    async function changeRoomPrivacy(newPrivacy) {
        const session = AuthService.getsession();
        try {
            const response = await fetch('http://localhost:8080/api/game/set/private', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + session,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ gameId: gameId, isPrivate: newPrivacy })
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            isPrivate = newPrivacy;
            updatePrivacyButtons(newPrivacy);
            alert(`Комната теперь ${newPrivacy ? 'ЗАКРЫТАЯ' : 'ОТКРЫТАЯ'}`);
        } catch (error) {
            console.error('Ошибка изменения приватности:', error);
            alert('Ошибка изменения приватности: ' + error.message);
        }
    }

    function updatePrivacyButtons(privacy) {
        document.querySelectorAll('.privacy-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtn = document.querySelector(`.privacy-btn[data-private="${privacy}"]`);
        if (activeBtn) activeBtn.classList.add('active');
    }

    async function startQuiz() {
        if (isQuizStarting) return;
        if (!isStandardQuizMode()) {
            alert(`Режим ${currentGameMode} уже сохранен, но его отдельный игровой экран еще не подключен.`);
            return;
        }
        if (currentPlayers.length < 2) {
            alert('Для начала квиза нужно минимум 2 игрока');
            return;
        }
        if (!questionsReady) {
            alert('Вопросы еще не готовы. Пожалуйста, подождите...');
            return;
        }

        isQuizStarting = true;
        isInternalNavigation = true;
        disableStartButton('Квиз начинается...');

        const session = AuthService.getsession();
        try {
            const response = await fetch('http://localhost:8080/api/game/start', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + session,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ gameId: gameId })
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);

            if (refreshInterval) clearInterval(refreshInterval);
            window.location.replace(`question.html?gameId=${gameId}&question=1`);
        } catch (error) {
            console.error('Ошибка начала квиза:', error);
            alert('Ошибка начала квиза: ' + error.message);
            isQuizStarting = false;
            isInternalNavigation = false;
            updateStartButtonState();
        }
    }

    async function stopGameAndExit() {
        isInternalNavigation = true;
        const session = AuthService.getsession();
        try {
            const response = await fetch('http://localhost:8080/api/game/delete', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + session,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ gameId: gameId })
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            if (refreshInterval) clearInterval(refreshInterval);
            localStorage.removeItem('currentGameId');
            localStorage.removeItem('selectedTopic');
            window.location.replace('main.html');
        } catch (error) {
            console.error('Ошибка удаления игры:', error);
            alert('Ошибка при выходе: ' + error.message);
        }
    }

    function confirmExit() {
        if (confirm('При выходе комната будет удалена. Вы уверены, что хотите выйти?')) {
            stopGameAndExit();
        }
    }

    function setupEventListeners() {
        document.querySelectorAll('.privacy-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                changeRoomPrivacy(btn.dataset.private === 'true');
            });
        });

        document.getElementById('start-quiz-btn').addEventListener('click', (e) => {
            e.preventDefault();
            if (!e.target.classList.contains('disabled') && !isQuizStarting) startQuiz();
        });

        const backBtn = document.getElementById('back-button');
        backBtn.addEventListener('click', (e) => {
            e.preventDefault();
            confirmExit();
        });
    }

    window.addEventListener('beforeunload', function (e) {
        if (!isInternalNavigation && gameId) {
            const url = 'http://localhost:8080/api/game/delete';
            const data = JSON.stringify({ gameId: gameId });
            if (navigator.sendBeacon) {
                const blob = new Blob([data], { type: 'application/json' });
                navigator.sendBeacon(url, blob);
            } else {
                fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: data,
                    keepalive: true
                }).catch(err => console.error('Ошибка sendBeacon:', err));
            }
            e.preventDefault();
            e.returnValue = 'Вы уверены, что хотите покинуть страницу? Комната будет удалена.';
            return e.returnValue;
        }
        if (refreshInterval) clearInterval(refreshInterval);
    });
</script>
</body>

</html>

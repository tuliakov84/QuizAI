name: quizai-multirepo

services:
  zookeeper:
	image: confluentinc/cp-zookeeper:7.6.0
	container_name: quizai-zookeeper
	restart: unless-stopped
	environment:
	  ZOOKEEPER_CLIENT_PORT: 2181
	  ZOOKEEPER_TICK_TIME: 2000
	ports:
	  - "2181:2181"
	networks:
	  - quizai-network

  kafka:
	image: confluentinc/cp-kafka:7.6.0
	container_name: quizai-kafka
	restart: unless-stopped
	depends_on:
	  - zookeeper
	ports:
	  - "9092:9092"
	  - "29092:29092"
	environment:
	  KAFKA_BROKER_ID: 1
	  KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
	  KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
	  KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
	  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
	  KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
	  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
	  KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
	  KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
	networks:
	  - quizai-network

  kafka-init:
	image: confluentinc/cp-kafka:7.6.0
	container_name: quizai-kafka-init-topics
	restart: "no"
	depends_on:
	  - kafka
	environment:
	  KAFKA_BOOTSTRAP_SERVERS: kafka:29092
	volumes:
	  - ./docker/kafka-topics-init.sh:/kafka-topics-init.sh:ro
	entrypoint: ["/bin/bash", "/kafka-topics-init.sh"]
	networks:
	  - quizai-network

  postgres:
	image: pgvector/pgvector:pg13
	container_name: quizai-postgres
	restart: unless-stopped
	environment:
	  POSTGRES_DB: quizai
	  POSTGRES_USER: postgres
	  POSTGRES_PASSWORD: postgres
	ports:
	  - "5432:5432"
	volumes:
	  - postgres_data:/var/lib/postgresql/data
	networks:
	  - quizai-network

  redis:
	image: redis:7-alpine
	container_name: quizai-redis
	restart: unless-stopped
	command: ["redis-server", "--appendonly", "yes"]
	ports:
	  - "6379:6379"
	volumes:
	  - redis_data:/data
	networks:
	  - quizai-network

  backend:
	image: ${QUIZAI_BACKEND_IMAGE:-ghcr.io/your-org/quizai-backend:latest}
	container_name: quizai-backend
	restart: unless-stopped
	depends_on:
	  - kafka
	  - postgres
	  - redis
	ports:
	  - "8080:8080"
	environment:
	  APP_SERVICE_ROLE: backend
	  APP_DATABASE_URL: jdbc:postgresql://postgres:5432/quizai
	  APP_DATABASE_USER: postgres
	  APP_DATABASE_PASSWORD: postgres
	  SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
	  OTP_REDIS_HOST: redis
	  OTP_REDIS_PORT: 6379
	networks:
	  - quizai-network

  question-generator:
	image: ${QUIZAI_GENERATOR_IMAGE:-ghcr.io/your-org/quizai-question-generator:latest}
	container_name: quizai-question-generator
	restart: unless-stopped
	depends_on:
	  - kafka
	environment:
	  APP_SERVICE_ROLE: generator
	  SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
	networks:
	  - quizai-network

  python-validation-worker:
	image: ${QUIZAI_PYTHON_WORKER_IMAGE:-ghcr.io/your-org/quizai-python-validation-worker:latest}
	container_name: quizai-python-validation-worker
	restart: unless-stopped
	depends_on:
	  - kafka
	  - postgres
	env_file:
	  - ./python-worker.env.example
	networks:
	  - quizai-network

volumes:
  postgres_data:
  redis_data:

networks:
  quizai-network:
	driver: bridge


